    // ============ STAMPA / DOWNLOAD (rapporti) ============
    function printDoc(title, bodyHtml){
      const dir=T[lang].dir, align=dir==='rtl'?'right':'left';
      const w=window.open('','_blank');
      if(!w){ toast(t('errorGen'),true); return; }
      w.document.write(`<!doctype html><html dir="${dir}" lang="${lang}"><head><meta charset="utf-8"><title>${title}</title>
        <style>body{font-family:Arial,Tahoma,sans-serif;padding:28px;color:#1A1A1A;}
        h1{color:#1F3A2E;font-size:22px;margin:0 0 2px;}.sub{color:#888;font-size:12px;margin-bottom:18px;}
        table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:18px;}
        th,td{border:1px solid #ddd;padding:7px 9px;text-align:${align};}
        th{background:#1F3A2E;color:#fff;font-weight:600;}.tot{font-weight:700;background:#F0EADC;}
        .pos{color:#C04848;}.neg{color:#3D7355;}h2{color:#1F3A2E;font-size:15px;margin:18px 0 8px;}</style></head>
        <body><h1>Le Coin</h1><div class="sub">${title} — ${fmtDT(Date.now())}</div>${bodyHtml}</body></html>`);
      w.document.close(); w.focus(); setTimeout(()=>{ try{w.print();}catch(e){} },400);
    }
    function downloadCSV(filename, header, rows){
      const esc=c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`;
      const csv=[header].concat(rows).map(r=>r.map(esc).join(',')).join('\r\n');
      const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob); const a=document.createElement('a');
      a.href=url; a.download=filename; document.body.appendChild(a); a.click();
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },800);
    }

    // تصدير Excel (ملف .xls يفتح في إكسل مباشرة — بدون مكتبات)
    function downloadXLS(filename, title, header, rows){
      const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const th=header.map(h=>`<th style="background:#1F3A2E;color:#fff;border:1px solid #999;padding:5px;">${esc(h)}</th>`).join('');
      const trs=rows.map(r=>`<tr>${r.map(c=>`<td style="border:1px solid #ccc;padding:5px;">${esc(c)}</td>`).join('')}</tr>`).join('');
      const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table><tr><th colspan="${header.length}" style="font-size:15px;">${esc(title)}</th></tr><tr>${th}</tr>${trs}</table></body></html>`;
      const blob=new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel;charset=utf-8;'});
      const url=URL.createObjectURL(blob); const a=document.createElement('a');
      a.href=url; a.download=filename; document.body.appendChild(a); a.click();
      setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },800);
    }
    // يبني جدول HTML من header+rows لاستخدامه في الطباعة/PDF
    function tableHtml(title, header, rows){
      const th=header.map(h=>`<th>${h}</th>`).join('');
      const trs=rows.map(r=>`<tr>${r.map(c=>`<td>${c==null?'':c}</td>`).join('')}</tr>`).join('');
      return `<h2>${title}</h2><table><tr>${th}</tr>${trs}</table>`;
    }

    // ============ HELPERS ============
    function setToggle(id,init,cb){ let v=init; const el=$(id); el.onclick=()=>{v=!v;el.style.background=v?'var(--forest)':'rgba(26,26,26,0.2)';cb(v);}; }
    function compress(file,maxW=600,q=0.7){ return new Promise(res=>{ const img=new Image(); img.onload=()=>{ const sc=Math.min(1,maxW/img.width); const c=document.createElement('canvas'); c.width=img.width*sc; c.height=img.height*sc; c.getContext('2d').drawImage(img,0,0,c.width,c.height); res(c.toDataURL('image/jpeg',q)); }; img.src=URL.createObjectURL(file); }); }

    // ===== النسخة الاحتياطية: تصدير/استيراد كل البيانات (JSON) =====
    const BACKUP_COLLECTIONS=['branches','categories','products','inventory','inventories','loads','sales','shifts','custodyTransfers','transfers','suppliers','users'];
    async function exportAllData(btn){
      if(btn){ btn.disabled=true; btn.textContent=t('exporting'); }
      try{
        const out={ app:'LeCoinPOS', version:1, exportedAt:Date.now(), collections:{} };
        for(const c of BACKUP_COLLECTIONS){
          const qs=await getDocs(collection(db,c));
          out.collections[c]=[]; qs.forEach(d=>out.collections[c].push({id:d.id,...d.data()}));
        }
        const blob=new Blob([JSON.stringify(out)],{type:'application/json'});
        const url=URL.createObjectURL(blob); const a=document.createElement('a');
        a.href=url; a.download=`lecoin-backup-${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a); a.click();
        setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },800);
        toast(t('exportDone'));
      }catch(e){ console.error(e); toast(t('errorGen'),true); }
      finally{ if(btn){ btn.disabled=false; btn.textContent='💾 '+t('exportData'); } }
    }
    async function importAllData(file,btn){
      if(!file) return;
      let data;
      try{ data=JSON.parse(await file.text()); }catch(e){ toast(t('importBad'),true); return; }
      if(!data||!data.collections){ toast(t('importBad'),true); return; }
      if(!confirm(t('importConfirm'))) return;
      if(btn){ btn.disabled=true; btn.textContent=t('importing'); }
      try{
        for(const c of BACKUP_COLLECTIONS){
          const arr=data.collections[c]; if(!Array.isArray(arr)) continue;
          for(const rec of arr){ const {id,...rest}=rec; if(!id) continue; await setDoc(doc(db,c,id),rest); }
        }
        toast(t('importDone'));
        setTimeout(()=>location.reload(),1200); // إعادة تحميل عشان البيانات الجديدة تظهر
      }catch(e){ console.error(e); toast(t('errorGen'),true); if(btn){ btn.disabled=false; btn.textContent='📥 '+t('importData'); } }
    }

    // ===== التقارير الشاملة: 5 تقارير + فلتر تاريخ + تصدير PDF/Excel/CSV =====
    // ===== تصفير قاعدة البيانات (أدمن فقط، تأكيد مزدوج + RESET) =====
    async function wipeCollection(name){
      const qs=await getDocs(collection(db,name));
      for(const d of qs.docs){ await deleteDoc(doc(db,name,d.id)); }
      return qs.size;
    }
    async function resetDatabase(opts, btn){
      // opts: {sales,loads,transfers,shifts,custody,inventoryZero}
      const any=opts.sales||opts.loads||opts.transfers||opts.shifts||opts.custody||opts.inventoryZero;
      if(!any){ toast(t('dbResetNothing'),true); return; }
      if(btn){ btn.disabled=true; btn.textContent=t('dbResetting'); }
      try{
        if(opts.sales) await wipeCollection('sales');        // المبيعات (الريفاند والمرتجعات جوّاها فبتتمسح معاها)
        if(opts.loads) await wipeCollection('loads');         // التوريد
        if(opts.transfers) await wipeCollection('transfers'); // التحويلات
        if(opts.shifts) await wipeCollection('shifts');       // الورديات
        if(opts.custody) await wipeCollection('custodyTransfers'); // العُهد
        if(opts.inventoryZero){                               // تصفير كل المخزون لكل الفروع
          const qs=await getDocs(collection(db,'inventory'));
          for(const d of qs.docs){ const x=d.data(); await setDoc(doc(db,'inventory',d.id),{branchId:x.branchId,productId:x.productId,qty:0,threshold:x.threshold||20,lastCost:x.lastCost||0}); }
        }
        toast(t('dbResetDone'));
        setTimeout(()=>location.reload(),1200);
      }catch(e){ console.error(e); toast(t('errorGen'),true); if(btn){ btn.disabled=false; btn.textContent='🧨 '+t('dbResetBtn'); } }
    }

    async function buildReportData(fromTs, toTs){
      const visIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
      // حمّل المبيعات + الاستلامات + الورديات + كل المخزون
      let sales=[], loadsArr=[], shiftsArr=[], invAll=[];
      if(profile.role==='admin'){ (await getDocs(collection(db,'sales'))).forEach(d=>sales.push(d.data())); }
      else { for(const b of visIds){ (await getDocs(query(collection(db,'sales'),where('branchId','==',b)))).forEach(d=>sales.push(d.data())); } }
      (await getDocs(collection(db,'loads'))).forEach(d=>loadsArr.push(d.data()));
      (await getDocs(collection(db,'shifts'))).forEach(d=>shiftsArr.push(d.data()));
      (await getDocs(collection(db,'inventory'))).forEach(d=>invAll.push(d.data()));
      const inRange=ts=>ts>=fromTs&&ts<=toTs;
      sales=sales.filter(s=>inRange(s.createdAt) && (profile.role==='admin'||visIds.includes(s.branchId)));
      loadsArr=loadsArr.filter(l=>inRange(l.createdAt) && (profile.role==='admin'||visIds.includes(l.branchId)));
      shiftsArr=shiftsArr.filter(s=>inRange(s.openAt) && (profile.role==='admin'||visIds.includes(s.branchId)));
      invAll=invAll.filter(i=>profile.role==='admin'||visIds.includes(i.branchId));
      const effTotal=s=>Math.max(0,(s.total||0)-(s.refundTotal||0));
      const rmFn=s=>{ const m={}; if(s.voided)(s.items||[]).forEach(it=>m[it.productId]=(m[it.productId]||0)+it.qty); (s.returns||[]).forEach(r=>(r.lines||[]).forEach(l=>m[l.productId]=(m[l.productId]||0)+l.qty)); return m; };
      const bName=id=>{const b=branches.find(x=>x.id===id);return b?(lang==='ar'?b.nameAr:b.nameEn):id;};
      const pCost=pid=>{const p=products.find(x=>x.id===pid);return p?(p.cost||0):0;};
      const uName=uid=>{const u=users.find(x=>x.uid===uid);return u?(u.name||u.email):'';};
      const cur=t('currency');
      // ===== المبيعات: فاتورة بفاتورة =====
      const sortedSales=[...sales].sort((a,b)=>a.createdAt-b.createdAt);
      const invRows=[]; 
      sortedSales.forEach(s=>{ if(s.voided) return; const rm=rmFn(s);
        let pc=0, prof=0; (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); pc+=net; prof+=net*((it.price||0)-pCost(it.productId)); });
        invRows.push([fmtDT(s.createdAt,s.tzo), '#'+(s.receiptNo||''), bName(s.branchId), s.userName||uName(s.userId), s.payMethod==='instapay'?t('mInstapay'):t('mCash'), pc, fmt(effTotal(s)), fmt(prof)]);
      });
      const salesByInvoice={ title:t('repSalesByInvoice'), header:[t('colDateTime'),t('colInvoice'),t('branch'),t('cashierLbl'),t('colPayment'),t('colProdCount'),t('colInvTotal'),t('colInvProfit')], rows:invRows };
      // ===== المبيعات: تفصيل المنتجات (سطر لكل منتج في كل فاتورة) =====
      const detRows=[];
      sortedSales.forEach(s=>{ if(s.voided) return; const rm=rmFn(s);
        (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); if(net<=0) return; const cost=pCost(it.productId);
          detRows.push([fmtDT(s.createdAt,s.tzo), '#'+(s.receiptNo||''), it.name, fmt(cost), fmt(it.price||0), net, fmt(net*(it.price||0)), fmt(net*((it.price||0)-cost))]);
        }); });
      const salesDetail={ title:t('repSalesDetail'), header:[t('colDateTime'),t('colInvoice'),t('colProduct'),t('cost'),t('colSell'),t('colQty'),t('colLineRev'),t('colLineProfit')], rows:detRows };
      // ---- ملخص بالمنتج ----
      const soldMap={};
      sales.forEach(s=>{ if(s.voided)return; const rm=rmFn(s); (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); if(!soldMap[it.productId])soldMap[it.productId]={qty:0,rev:0}; soldMap[it.productId].qty+=net; soldMap[it.productId].rev+=net*(it.price||0); }); });
      const purMap={}; loadsArr.forEach(l=>{ purMap[l.productId]=(purMap[l.productId]||0)+(l.qty||0); });
      const stockMap={}; invAll.forEach(i=>{ stockMap[i.productId]=(stockMap[i.productId]||0)+(i.qty||0); });
      const productsRep={ title:t('repProducts'), header:[t('name'),t('unitsSold'),t('revenue'),t('purchased'),t('stock'),t('cost'),t('price'),t('grossProfit')],
        rows:products.map(p=>{ const sm=soldMap[p.id]||{qty:0,rev:0}; const prof=sm.rev-sm.qty*(p.cost||0);
          return [p.name, sm.qty, fmt(sm.rev), purMap[p.id]||0, stockMap[p.id]||0, fmt(p.cost||0), fmt(p.price||0), fmt(prof)]; }) };
      // ===== المشتريات: تفصيل (سطر لكل استلام) =====
      const sortedLoads=[...loadsArr].sort((a,b)=>a.createdAt-b.createdAt);
      const purRows=sortedLoads.map(l=>[fmtDT(l.createdAt,l.tzo), l.supplierName||t('noSupplier'), l.name, fmt(l.unitCost||0), l.qty||0, fmt(l.total||0), l.userName||'']);
      const purchasesDetail={ title:t('repPurchasesDetail'), header:[t('colDateTime'),t('supplier'),t('colProduct'),t('colUnitCost'),t('colQty'),t('colInvTotal'),t('colReceivedBy')], rows:purRows };
      // ---- ملخص الموردين ----
      const supMap={};
      loadsArr.forEach(l=>{ const k=l.supplierName||t('noSupplier'); if(!supMap[k])supMap[k]={qty:0,cost:0,cnt:0}; supMap[k].qty+=(l.qty||0); supMap[k].cost+=(l.total||0); supMap[k].cnt++; });
      const suppliersRep={ title:t('repSuppliers'), header:[t('supplier'),t('itemsN'),t('purchased'),t('cogs')+'('+cur+')'],
        rows:Object.entries(supMap).map(([k,v])=>[k,v.cnt,v.qty,fmt(v.cost)]) };
      // ===== الفروع: تفصيل (سطر لكل منتج في كل فرع) =====
      const brProd={}; // branchId -> productId -> {qty,rev,prof}
      sales.forEach(s=>{ if(s.voided)return; const rm=rmFn(s); (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); if(net<=0)return; brProd[s.branchId]=brProd[s.branchId]||{}; const m=brProd[s.branchId]; if(!m[it.productId])m[it.productId]={qty:0,rev:0,prof:0}; m[it.productId].qty+=net; m[it.productId].rev+=net*(it.price||0); m[it.productId].prof+=net*((it.price||0)-pCost(it.productId)); }); });
      const brDetRows=[];
      visIds.forEach(bid=>{ const m=brProd[bid]; if(!m)return; Object.entries(m).sort((a,b)=>b[1].rev-a[1].rev).forEach(([pid,v])=>{ const p=products.find(x=>x.id===pid); brDetRows.push([bName(bid), p?p.name:'—', v.qty, fmt(v.rev), fmt(v.prof)]); }); });
      const branchesDetail={ title:t('repBranchesDetail'), header:[t('branch'),t('colProduct'),t('colQty'),t('revenue'),t('colLineProfit')], rows:brDetRows };
      // ---- ملخص الفروع ----
      const brRev={}, brCnt={}, brStock={};
      sales.forEach(s=>{ brRev[s.branchId]=(brRev[s.branchId]||0)+effTotal(s); if(!s.voided)brCnt[s.branchId]=(brCnt[s.branchId]||0)+1; });
      invAll.forEach(i=>{ const p=products.find(x=>x.id===i.productId); brStock[i.branchId]=(brStock[i.branchId]||0)+(i.qty||0)*(p?(p.price||0):0); });
      const branchesRep={ title:t('repBranches'), header:[t('branch'),t('revenue'),t('invoicesShort'),t('stockVal')],
        rows:visIds.map(id=>[bName(id), fmt(brRev[id]||0), brCnt[id]||0, fmt(brStock[id]||0)]) };
      // ===== الموظفين: تفصيل (سطر لكل فاتورة) =====
      const usrDetRows=[];
      sortedSales.forEach(s=>{ if(s.voided)return; const rm=rmFn(s); let pc=0,prof=0; (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); pc+=net; prof+=net*((it.price||0)-pCost(it.productId)); });
        usrDetRows.push([s.userName||uName(s.userId), fmtDT(s.createdAt,s.tzo), '#'+(s.receiptNo||''), s.payMethod==='instapay'?t('mInstapay'):t('mCash'), pc, fmt(effTotal(s)), fmt(prof)]); });
      usrDetRows.sort((a,b)=>String(a[0]).localeCompare(String(b[0])));
      const usersDetail={ title:t('repUsersDetail'), header:[t('cashierLbl'),t('colDateTime'),t('colInvoice'),t('colPayment'),t('colProdCount'),t('colInvTotal'),t('colInvProfit')], rows:usrDetRows };
      // ---- ملخص المستخدمين ----
      const uSales={}, uCnt={}, uMs={};
      sales.forEach(s=>{ uSales[s.userId]=(uSales[s.userId]||0)+effTotal(s); if(!s.voided)uCnt[s.userId]=(uCnt[s.userId]||0)+1; });
      shiftsArr.forEach(s=>{ if(s.status==='closed'&&s.workedMs) uMs[s.userId]=(uMs[s.userId]||0)+s.workedMs; });
      const usersRep={ title:t('repUsers'), header:[t('name'),t('role'),t('revenue'),t('invoicesShort'),t('hoursWorked')],
        rows:users.map(u=>[u.name||u.email, t(u.role), fmt(uSales[u.uid]||0), uCnt[u.uid]||0, ((uMs[u.uid]||0)/3600000).toFixed(1)]) };
      // ===== الأرباح: إجمالي + لكل فرع =====
      const revTot=sales.reduce((a,s)=>a+effTotal(s),0);
      let cogsTot=0; sales.forEach(s=>{ if(s.voided)return; const rm=rmFn(s); (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); cogsTot+=net*pCost(it.productId); }); });
      const purTot=loadsArr.reduce((a,l)=>a+(l.total||0),0);
      const profRows=[ [t('revenue'),fmt(revTot)], [t('cogs'),fmt(cogsTot)], [t('grossProfit'),fmt(revTot-cogsTot)], [t('purchasesTotal'),fmt(purTot)] ];
      // تفصيل ربح كل فرع
      visIds.forEach(bid=>{ let r=0,c=0; sales.forEach(s=>{ if(s.branchId!==bid||s.voided)return; r+=effTotal(s); const rm=rmFn(s); (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); c+=net*pCost(it.productId); }); });
        if(r>0) profRows.push([bName(bid)+' — '+t('grossProfit'), fmt(r-c)]); });
      const profitsRep={ title:t('repProfits'), header:[t('name'),cur], rows:profRows };
      return { salesByInvoice, salesDetail, products:productsRep, purchasesDetail, suppliers:suppliersRep, branchesDetail, branches:branchesRep, usersDetail, users:usersRep, profits:profitsRep };
    }
    let _repCache=null;
    function openFullReports(){
      const now=new Date(); const mStart=new Date(now.getFullYear(),now.getMonth(),1);
      const f=mStart.toISOString().slice(0,10), tt=now.toISOString().slice(0,10);
      const row=(key,id)=>`<div style="padding:9px 0;border-bottom:1px solid var(--ivory-dark);">
        <div style="font-weight:600;font-size:13px;margin-bottom:6px;">${t(key)}</div>
        <div style="display:flex;gap:6px;">
          <button class="btn-secondary rep-btn" data-k="${id}" data-f="pdf" style="flex:1;padding:8px 0;">📄 PDF</button>
          <button class="btn-secondary rep-btn" data-k="${id}" data-f="xls" style="flex:1;padding:8px 0;">📊 Excel</button>
          <button class="btn-secondary rep-btn" data-k="${id}" data-f="csv" style="flex:1;padding:8px 0;">📑 CSV</button>
        </div></div>`;
      const sec=(title,rows)=>`<div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;margin:14px 0 4px;">${title}</div>${rows}`;
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('fullReports')}</div><div class="sheet-title">📑 ${t('fullReports')}</div></div><button class="close-x" id="cx">×</button></div>
        <div style="font-size:12px;color:rgba(26,26,26,0.55);margin-bottom:10px;">${t('pickRangeHint')}</div>
        <div class="row2"><div class="field"><label class="lbl">${t('repFrom')}</label><input class="input" id="rep-from" type="date" value="${f}"></div>
          <div class="field"><label class="lbl">${t('repTo')}</label><input class="input" id="rep-to" type="date" value="${tt}"></div></div>
        <div id="rep-list">
          ${sec(t('secSales'), row('salesByInvoice','salesByInvoice')+row('salesDetail','salesDetail')+row('repProducts','products'))}
          ${sec(t('secPurchases'), row('repPurchasesDetail','purchasesDetail')+row('repSuppliers','suppliers'))}
          ${sec(t('secBranchesSec'), row('repBranchesDetail','branchesDetail')+row('repBranches','branches'))}
          ${sec(t('secUsersSec'), row('repUsersDetail','usersDetail')+row('repUsers','users'))}
          ${sec(t('secProfitsSec'), row('repProfits','profits'))}
        </div>
        <div id="rep-busy" style="text-align:center;font-size:12px;color:var(--forest);margin-top:8px;"></div>
      </div></div>`;
      $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
      document.querySelectorAll('.rep-btn').forEach(b=>b.onclick=async()=>{
        const fromTs=dayStart(new Date($('rep-from').value+'T00:00:00').getTime());
        const toTs=new Date($('rep-to').value+'T23:59:59').getTime();
        $('rep-busy').textContent=t('loadingReports')||'...';
        try{
          const data=await buildReportData(fromTs,toTs);
          const rep=data[b.dataset.k]; const fmt2=b.dataset.f;
          const fname=`${b.dataset.k}_${$('rep-from').value}_${$('rep-to').value}`;
          if(fmt2==='csv') downloadCSV(fname+'.csv', rep.header, rep.rows);
          else if(fmt2==='xls') downloadXLS(fname+'.xls', rep.title, rep.header, rep.rows);
          else printDoc(rep.title, tableHtml(rep.title+` (${$('rep-from').value} → ${$('rep-to').value})`, rep.header, rep.rows));
          $('rep-busy').textContent='';
        }catch(e){ console.error(e); $('rep-busy').textContent=''; toast(t('errorGen'),true); }
      });
    }

    // ===== إدارة الحساب: تغيير اسم/كلمة مرور (للأدمن نفسه) + إيميل reset للموظفين =====
    async function changeMyName(newName){
      newName=(newName||'').trim(); if(!newName){ toast(t('required'),true); return false; }
      try{ await updateDoc(doc(db,'users',user.uid),{name:newName}); profile.name=newName; toast(t('nameChanged')); return true; }
      catch(e){ console.error(e); toast(t('errorGen'),true); return false; }
    }
    async function changeMyPassword(curPwd, newPwd, newPwd2, btn){
      if(!newPwd||newPwd.length<6){ toast(t('pwdTooShort'),true); return; }
      if(newPwd!==newPwd2){ toast(t('pwdMismatch'),true); return; }
      if(btn){ btn.disabled=true; btn.textContent='...'; }
      try{
        // إعادة المصادقة قبل تغيير كلمة المرور (متطلب أمان في Firebase)
        const cred=EmailAuthProvider.credential(user.email, curPwd);
        await reauthenticateWithCredential(user, cred);
        await updatePassword(user, newPwd);
        toast(t('pwdChanged')); closeSheet();
      }catch(e){
        console.error(e);
        if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential') toast(t('pwdWrong'),true);
        else toast(t('errorGen'),true);
      }finally{ if(btn){ btn.disabled=false; btn.textContent='✓ '+t('changePassword'); } }
    }
    async function sendResetEmailTo(email, btn){
      if(!email){ toast(t('noEmailUser'),true); return; }
      if(btn){ btn.disabled=true; btn.textContent='...'; }
      try{ await sendPasswordResetEmail(auth, email); toast(t('resetSent')); }
      catch(e){ console.error(e); toast(t('errorGen'),true); }
      finally{ if(btn){ btn.disabled=false; btn.textContent='📧 '+t('sendResetEmail'); } }
    }

    function openSettings(){
      const roleLabel=t(profile.role);
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('settings')}</div><div class="sheet-title">${profile.name||user.email}</div></div><button class="close-x" id="cx">×</button></div>
        <div class="card" style="display:grid;gap:8px;font-size:13px;">
          <div style="display:flex;justify-content:space-between;"><span style="color:rgba(26,26,26,0.6);">${t('email')}</span><span class="num">${user.email}</span></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:rgba(26,26,26,0.6);">${t('role')}</span><span style="font-weight:600;color:var(--forest);">${roleLabel}</span></div>
        </div>
        <div class="card" style="display:grid;gap:10px;">
          <div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;">👤 ${t('myAccount')}</div>
          <div class="field" style="margin:0;"><label class="lbl">${t('name')}</label><input class="input" id="acc-name" value="${(profile.name||'').replace(/"/g,'&quot;')}"></div>
          <button class="btn-secondary btn-wide" id="acc-name-save">${t('changeName')}</button>
          <div style="height:6px;"></div>
          <div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;">🔑 ${t('changePassword')}</div>
          <div class="field" style="margin:0;"><label class="lbl">${t('currentPassword')}</label><input class="input" id="acc-cur" type="password" autocomplete="current-password"></div>
          <div class="field" style="margin:0;"><label class="lbl">${t('newPassword')}</label><input class="input" id="acc-new" type="password" autocomplete="new-password"></div>
          <div class="field" style="margin:0;"><label class="lbl">${t('newPasswordAgain')}</label><input class="input" id="acc-new2" type="password" autocomplete="new-password"></div>
          <button class="btn-forest btn-wide" id="acc-pwd-save">✓ ${t('changePassword')}</button>
        </div>
        ${profile.role==='admin'?`<div class="card" style="display:grid;gap:10px;">
          <div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;">📲 ${t('instapayTitle')}</div>
          <div id="ipay-prev" style="text-align:center;${instapayCfg.qrDataUrl?'':'display:none;'}background:#fff;border:1px solid var(--ivory-dark);border-radius:10px;padding:10px;">
            ${instapayCfg.qrDataUrl?`<img src="${instapayCfg.qrDataUrl}" style="max-width:200px;width:100%;height:auto;border-radius:6px;">`:''}
          </div>
          <button class="btn-secondary btn-wide" id="ipay-up-btn">📷 ${t('uploadQr')}</button>
          <input type="file" id="ipay-up" accept="image/*" class="hidden">
          <div class="field" style="margin:0;"><label class="lbl">${t('instapayAlias')}</label><input class="input" id="ipay-alias" value="${(instapayCfg.alias||'').replace(/"/g,'&quot;')}" dir="ltr" placeholder="amanyfadil@instapay"></div>
          <button class="btn-forest btn-wide" id="ipay-save">✓ ${t('saveCfg')}</button>
        </div>
        <div class="card" style="display:grid;gap:8px;">
          <div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;">💾 ${t('backupTitle')}</div>
          <div style="font-size:11px;color:rgba(26,26,26,0.55);margin-bottom:4px;">${t('backupHint')}</div>
          <button class="btn-forest btn-wide" id="exp-btn">💾 ${t('exportData')}</button>
          <button class="btn-secondary btn-wide" id="imp-btn">📥 ${t('importData')}</button>
          <input type="file" id="imp-input" accept="application/json,.json" class="hidden">
        </div>
        <div class="card" style="display:grid;gap:8px;border:1px solid rgba(192,72,72,0.3);">
          <div style="font-size:11px;letter-spacing:0.5px;color:var(--red);font-weight:700;">🧨 ${t('dbResetTitle')}</div>
          <div style="font-size:11px;color:rgba(26,26,26,0.55);margin-bottom:4px;">${t('dbResetHint')}</div>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:1px solid var(--ivory-dark);padding-bottom:6px;"><input type="checkbox" id="rs-all"> ${t('selectAll')}</label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" class="rs-chk" id="rs-sales"> ${t('rSales')}</label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" class="rs-chk" id="rs-loads"> ${t('rLoads')}</label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" class="rs-chk" id="rs-transfers"> ${t('rTransfers')}</label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" class="rs-chk" id="rs-shifts"> ${t('rShifts')}</label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" class="rs-chk" id="rs-custody"> ${t('rCustody')}</label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" class="rs-chk" id="rs-inv"> ${t('rInventoryZero')}</label>
          <input class="input" id="rs-word" placeholder="${t('typeResetWord')}" style="margin-top:6px;text-align:center;font-weight:700;letter-spacing:2px;">
          <button class="btn-secondary btn-wide" id="rs-do" style="color:var(--red);border-color:rgba(192,72,72,0.4);">🧨 ${t('dbResetBtn')}</button>

      $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
      if(profile.role==='admin'){

        $('imp-btn').onclick=()=>$('imp-input').click();

          if(!(opts.sales||opts.loads||opts.transfers||opts.shifts||opts.custody||opts.inventoryZero)){ toast(t('dbResetNothing'),true); return; }

          if(!confirm(t('dbResetConfirm1'))) return;
          if(!confirm(t('dbResetConfirm2'))) return;
          resetDatabase(opts,$('rs-do'));
        };
        // إعدادات Instapay
        let pendingIpayQr=instapayCfg.qrDataUrl||'';
        $('ipay-up-btn')&&($('ipay-up-btn').onclick=()=>$('ipay-up').click());
        $('ipay-up')&&($('ipay-up').onchange=async e=>{ const f=e.target.files&&e.target.files[0]; if(!f) return; try{ pendingIpayQr=await compress(f,500,0.85); const pv=$('ipay-prev'); pv.innerHTML=`<img src="${pendingIpayQr}" style="max-width:200px;width:100%;height:auto;border-radius:6px;">`; pv.style.display='block'; }catch(err){ console.error(err); toast(t('errorGen'),true); } });
        $('ipay-save')&&($('ipay-save').onclick=async()=>{

      $('acc-name-save').onclick=async()=>{ const b=$('acc-name-save'); b.disabled=true; const ok=await changeMyName($('acc-name').value); b.disabled=false; };
      $('acc-pwd-save').onclick=()=>changeMyPassword($('acc-cur').value, $('acc-new').value, $('acc-new2').value, $('acc-pwd-save'));
      $('logout-btn').onclick=async()=>{ await signOut(auth); closeSheet(); };

    // ============ INIT ============
    refreshLoginLabels(); applyLang();
    if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
