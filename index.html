<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1F3A2E">
  <meta name="theme-color" content="#1F3A2E">
  <link rel="manifest" href="manifest.json">
  <title>Le Coin · POS</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    :root {
      --forest:#1F3A2E; --forest-dark:#152821; --gold:#C9A84C; --gold-light:#E0C880;
      --ivory:#FAF6EE; --ivory-dark:#F0EADC; --charcoal:#1A1A1A;
      --red:#C04848; --green:#3D7355; --amber:#D88E2A;
    }
    body { font-family:'Tajawal','Inter',system-ui,sans-serif; background:var(--ivory); color:var(--charcoal); min-height:100vh; }
    body[dir=ltr] { font-family:'Inter',system-ui,sans-serif; }
    .num { font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; direction:ltr; unicode-bidi:embed; }
    .fr { font-family:'Cormorant Garamond',serif; font-style:italic; direction:ltr; }
    .hidden { display:none !important; }

    /* LOGIN */
    .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:var(--forest); }
    .login-card { background:var(--ivory); border-radius:20px; padding:30px 24px; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    .login-brand { text-align:center; margin-bottom:24px; }
    .login-brand .lb-name { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:40px; color:var(--forest); font-weight:500; }
    .login-brand .lb-tag { font-size:10px; letter-spacing:3px; color:var(--gold); font-weight:700; text-transform:uppercase; margin-top:2px; }

    header { background:var(--forest); color:var(--ivory); padding:10px 16px; position:sticky; top:0; z-index:20; padding-top:max(10px,env(safe-area-inset-top)); }
    .header-inner { display:flex; justify-content:space-between; align-items:center; max-width:900px; margin:0 auto; gap:10px; }
    .brand-name { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:22px; font-weight:500; }
    #header-logo { height:62px !important; }
    .header-ctrl { display:flex; align-items:center; gap:8px; }
    .branch-sel { background:rgba(255,255,255,0.1); color:var(--ivory); border:1px solid rgba(201,168,76,0.3); border-radius:8px; padding:5px 8px; font-size:11px; font-family:inherit; max-width:120px; }
    .lang-btn { background:rgba(201,168,76,0.2); color:var(--gold); border:none; border-radius:8px; padding:5px 9px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; }
    .user-btn { background:none; border:none; color:var(--ivory); cursor:pointer; font-size:18px; opacity:0.85; }

    main { max-width:900px; margin:0 auto; padding:16px; padding-bottom:calc(96px + env(safe-area-inset-bottom,0)); }
    .card { background:white; border-radius:16px; padding:16px; box-shadow:0 1px 2px rgba(0,0,0,0.04),0 4px 12px rgba(0,0,0,0.04); margin-bottom:14px; }
    .card-title { font-size:11px; letter-spacing:1px; color:var(--forest); font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:6px; }

    .input { width:100%; padding:11px 12px; font-size:14px; border:1px solid var(--ivory-dark); border-radius:10px; background:var(--ivory); outline:none; color:var(--charcoal); font-family:inherit; }
    .input:focus { border-color:var(--gold); }
    input[type=number].input::-webkit-outer-spin-button, input[type=number].input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    .input::placeholder { color:rgba(26,26,26,0.35); }
    label.lbl { font-size:10px; letter-spacing:0.5px; color:rgba(26,26,26,0.6); font-weight:600; margin-bottom:5px; display:block; }
    .field { margin-bottom:12px; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .btn-forest { background:var(--forest); color:var(--ivory); border:none; padding:12px 18px; border-radius:10px; font-weight:600; font-size:13px; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
    .btn-gold { background:var(--gold); color:var(--forest-dark); border:none; padding:12px 22px; border-radius:12px; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 12px rgba(201,168,76,0.3); }
    .btn-secondary { background:white; color:var(--charcoal); border:1px solid var(--ivory-dark); padding:10px 16px; border-radius:10px; font-weight:600; font-size:12px; cursor:pointer; font-family:inherit; }
    .btn-wide { width:100%; justify-content:center; }

    nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--ivory-dark); z-index:40; padding-bottom:env(safe-area-inset-bottom,0); box-shadow:0 -2px 12px rgba(0,0,0,0.06); }
    .nav-inner { max-width:900px; margin:0 auto; display:flex; flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; scroll-snap-type:x proximity; }
    .nav-inner::-webkit-scrollbar { display:none; }
    .nav-btn { flex:0 0 auto; min-width:70px; background:transparent; border:none; padding:9px 6px 7px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; color:rgba(26,26,26,0.5); position:relative; font-family:inherit; scroll-snap-align:center; }
    .nav-btn.active { color:var(--forest); }
    .nav-btn.active::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:32px; height:3px; background:var(--gold); border-radius:0 0 4px 4px; }
    .nav-btn .ico { font-size:22px; }
    .nav-btn .lbl2 { font-size:10.5px; font-weight:600; white-space:nowrap; }

    .overlay { position:fixed; inset:0; background:rgba(26,26,26,0.55); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
    @keyframes sheetin { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .sheet { background:var(--ivory); border-radius:20px 20px 0 0; padding:22px; width:100%; max-width:480px; max-height:92vh; overflow-y:auto; animation:sheetin 0.3s cubic-bezier(0.32,0.72,0,1); }
    .sheet-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
    .sheet-sub { font-size:11px; letter-spacing:0.5px; color:var(--gold); font-weight:700; }
    .sheet-title { font-size:22px; font-weight:600; color:var(--forest); }
    .close-x { background:none; border:none; cursor:pointer; font-size:22px; color:var(--charcoal); }

    @keyframes toastin { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }
    .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--forest); color:var(--ivory); padding:10px 18px; border-radius:999px; font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.2); z-index:100; animation:toastin 0.3s ease-out; max-width:90%; text-align:center; }
    .toast.err { background:var(--red); }

    .empty { text-align:center; padding:24px 16px; color:rgba(26,26,26,0.45); font-size:13px; }
    .spinner { width:34px; height:34px; border:3px solid var(--ivory-dark); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:30px auto; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* CATEGORY ROW */
    .cat-row { background:white; border-radius:10px; padding:12px; display:flex; align-items:center; gap:12px; margin-bottom:6px; cursor:pointer; }
    .cat-order { width:28px; height:28px; border-radius:6px; background:var(--ivory); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .cat-names { flex:1; min-width:0; }

    /* PRODUCT CARD */
    .prod-card { background:white; border-radius:12px; padding:10px; display:flex; gap:12px; margin-bottom:8px; cursor:pointer; align-items:center; }
    .prod-photo { width:56px; height:56px; border-radius:10px; object-fit:cover; flex-shrink:0; background:var(--ivory-dark); display:flex; align-items:center; justify-content:center; font-size:22px; color:rgba(26,26,26,0.3); }
    .prod-info { flex:1; min-width:0; }
    .prod-meta { display:flex; gap:10px; margin-top:4px; font-size:11px; }
    .photo-upload { width:100%; height:160px; border:2px dashed var(--ivory-dark); border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; gap:6px; color:rgba(26,26,26,0.5); background:white; overflow:hidden; position:relative; }
    .photo-upload img { width:100%; height:100%; object-fit:cover; }
    .toggle { position:relative; width:44px; height:26px; border-radius:999px; border:none; cursor:pointer; padding:0; flex-shrink:0; }
    .toggle .thumb { position:absolute; top:3px; width:20px; height:20px; background:var(--ivory); border-radius:50%; transition:all 0.2s; }
    body[dir=rtl] .toggle .thumb { right:3px; }
    body[dir=ltr] .toggle .thumb { left:3px; }

    /* CASSA / CASHIER */
    .pos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:120px; }
    /* تحسين للتابلت والشاشات الكبيرة */
    /* قاعدة عامة: على الموبايل، أي نص صغير (10-11px) يبقى 13px عشان يبان كويس */
    @media (max-width:699px){
      [style*="font-size:10px"]{ font-size:12.5px !important; }
      [style*="font-size:10.5px"]{ font-size:13px !important; }
      [style*="font-size:11px"]{ font-size:13px !important; }
      [style*="font-size:9px"]{ font-size:12px !important; }
      .empty { font-size:14.5px !important; }
      .lbl { font-size:13px !important; }
      .nav-btn .lbl2 { font-size:11px !important; } /* تبويبات الشريط: نخلّيها 11 عشان تكفي 6 أزرار */
      /* تباعد الأسطر أوسع شوية على الموبايل */
      body, .card, .prod-info, .prod-card { line-height:1.45; }
      /* الأسماء الرئيسية في الكاشير */
      .pc-name { font-size:14.5px !important; font-weight:700 !important; }
      .pc-desc { font-size:11.5px !important; }
    }
    /* تحسينات الموبايل: نصوص أوضح + لمس مريح (مساحة الضغط) + iOS بدون zoom */
    body { font-size:15px; -webkit-text-size-adjust:100%; }
    .input { font-size:16px; min-height:44px; padding:12px 14px; } /* 16px يمنع iOS من تكبير الصفحة */
    .btn-forest, .btn-gold, .btn-secondary { min-height:44px; padding:12px 18px; font-size:14px; }
    .nav-btn { min-width:74px; padding:10px 6px 8px; }
    .nav-btn .ico { font-size:24px; }
    .nav-btn .lbl2 { font-size:11px; }
    .card { padding:18px; }
    .empty { padding:28px 16px; font-size:14px; }
    .lbl { font-size:12px; margin-bottom:5px; display:block; color:rgba(26,26,26,0.65); font-weight:600; }
    .branch-sel { font-size:13px; padding:8px 12px; max-width:160px; min-height:38px; }
    .lang-btn, .user-btn { min-width:38px; min-height:38px; }
    select.input { min-height:44px; }
    /* مسافة آمنة تحت المحتوى عشان شريط التنقل ما يغطيش */
    main { padding-bottom:120px !important; }
    @media (min-width:700px){
      body { font-size:16px; }
      main { max-width:1100px; padding:22px; padding-bottom:140px !important; }
      .header-inner, .nav-inner, .cart-inner, .cart-panel { max-width:1100px; }
      .pos-grid { grid-template-columns:repeat(auto-fill,minmax(165px,1fr)); gap:14px; }
      #header-logo { height:72px !important; }
      .card { padding:22px; margin-bottom:18px; }
      .input { font-size:15px; padding:13px 16px; min-height:48px; }
      .btn-forest, .btn-gold, .btn-secondary { min-height:48px; font-size:15px; padding:14px 22px; }
      .nav-btn .ico { font-size:26px; }
      .nav-btn .lbl2 { font-size:12px; }
    }
    @media (min-width:1000px){ main { max-width:1200px; } .header-inner,.nav-inner{ max-width:1200px; } }
    /* قائمة الأقسام (drawer) */
    .menu-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    @media (min-width:600px){ .menu-grid { grid-template-columns:repeat(4,1fr); } }
    .menu-tile { background:var(--ivory); border:1px solid var(--ivory-dark); border-radius:16px; padding:18px 8px; display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; font-family:inherit; transition:transform .08s, background .15s; }
    .menu-tile:active { transform:scale(0.96); }
    .menu-tile.active { background:var(--forest); border-color:var(--forest); }
    .menu-tile.active .mt-l, .menu-tile.active .mt-i { color:#fff; }
    .menu-tile .mt-i { font-size:30px; }
    .menu-tile .mt-l { font-size:12.5px; font-weight:700; color:var(--charcoal); text-align:center; line-height:1.2; }
    .pos-card { background:white; border-radius:14px; overflow:hidden; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,0.04),0 4px 12px rgba(0,0,0,0.05); border:2px solid transparent; transition:border-color 0.15s; text-align:start; display:flex; flex-direction:column; }
    .pos-card:active { border-color:var(--gold); }
    .pos-card .pc-photo { width:100%; aspect-ratio:1/1; object-fit:cover; background:var(--ivory-dark); display:flex; align-items:center; justify-content:center; font-size:34px; color:rgba(26,26,26,0.3); }
    .pos-card .pc-body { padding:8px 10px 10px; }
    .pos-card .pc-name { font-size:14px; font-weight:500; line-height:1.2; }
    .pos-card .pc-desc { font-size:11px; color:rgba(26,26,26,0.55); margin-top:2px; min-height:14px; line-height:1.3; }
    .pos-card .pc-price { font-weight:700; color:var(--forest); margin-top:5px; }
    .pos-card .pc-badge { display:inline-block; margin-top:4px; font-size:10px; padding:1px 6px; border-radius:6px; background:rgba(192,72,72,0.12); color:var(--red); }
    /* CART bar */
    .cart-bar { position:fixed; bottom:62px; left:0; right:0; z-index:35; padding:0 12px; pointer-events:none; }
    .cart-inner { max-width:900px; margin:0 auto; background:var(--forest); color:var(--ivory); border-radius:14px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 8px 28px rgba(0,0,0,0.28); pointer-events:auto; cursor:pointer; }
    .cart-panel { max-width:900px; margin:0 auto; background:var(--ivory); border-radius:16px 16px 0 0; box-shadow:0 -8px 30px rgba(0,0,0,0.22); pointer-events:auto; overflow:hidden; border:1px solid var(--ivory-dark); }
    .cart-panel-head { background:var(--forest); color:var(--ivory); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
    .cart-panel-items { max-height:38vh; overflow-y:auto; padding:4px 14px; }
    .cart-mini-line { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--ivory-dark); }
    .cart-count { background:var(--gold); color:var(--forest-dark); border-radius:999px; min-width:24px; height:24px; padding:0 7px; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; }
    /* cart sheet rows */
    .cart-line { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--ivory-dark); }
    .cart-line .cl-photo { width:44px; height:44px; border-radius:8px; object-fit:cover; background:var(--ivory-dark); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; }
    .qty-ctrl { display:flex; align-items:center; gap:8px; }
    .qty-btn { width:30px; height:30px; border-radius:8px; border:1px solid var(--ivory-dark); background:white; font-size:18px; font-weight:700; cursor:pointer; color:var(--forest); display:flex; align-items:center; justify-content:center; }
    .pos-cat-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-bottom:10px; -webkit-overflow-scrolling:touch; }
    .pos-cat-chip { white-space:nowrap; padding:7px 14px; border-radius:999px; border:1px solid var(--ivory-dark); background:white; font-size:13px; font-weight:600; cursor:pointer; color:rgba(26,26,26,0.6); font-family:inherit; }
    .pos-cat-chip.active { background:var(--forest); color:var(--ivory); border-color:var(--forest); }
  </style></head>
<body>
  <!-- LOGIN -->
  <div class="login-wrap" id="login-screen">
    <div class="login-card">
      <div class="login-brand"><img id="login-logo" alt="Le Coin" style="max-width:180px;width:62%;height:auto;display:block;margin:0 auto 10px;border-radius:14px;box-shadow:0 6px 18px rgba(31,58,46,0.18);"><div class="lb-tag">POINT OF SALE</div></div>
      <div class="field"><label class="lbl" id="l-email-lbl">البريد الإلكتروني</label><input class="input" id="login-email" type="email" autocomplete="username"></div>
      <div class="field"><label class="lbl" id="l-pass-lbl">كلمة المرور</label><input class="input" id="login-pass" type="password" autocomplete="current-password"></div>
      <button class="btn-gold btn-wide" id="login-btn" style="margin-top:6px;">دخول</button>
      <div id="login-error" style="color:var(--red);font-size:12px;text-align:center;margin-top:12px;min-height:16px;"></div>
      <button class="lang-btn" id="login-lang" style="display:block;margin:14px auto 0;background:rgba(31,58,46,0.08);color:var(--forest);">EN</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <header>
      <div class="header-inner">
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="menu-btn" id="menu-btn" aria-label="menu" style="background:rgba(255,255,255,0.12);border:none;color:var(--ivory);width:42px;height:42px;border-radius:11px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;">☰</button>
          <img id="header-logo" class="brand-name" alt="Le Coin" style="height:62px;width:auto;border-radius:11px;">
        </div>
        <div class="header-ctrl">
          <select class="branch-sel" id="branch-select"></select>
          <button class="lang-btn" id="lang-btn">EN</button>
          <button class="user-btn" id="user-btn">⚙</button>
        </div>
      </div>
    </header>

    <main>
      <div id="content"></div>
    </main>

    <nav><div class="nav-inner" id="nav-inner"></div></nav>
  </div>

  <div id="sheet-root"></div>
  <div id="toast-root"></div>

  <!-- libreria scanner barcode (camera) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

    let lang = localStorage.getItem('lecoin_lang') || 'ar';

    let user=null, profile=null, branches=[], currentBranchId=null;

    let custodyTx=[]; // تحويلات العهدة (pending/confirmed) للفرع الحالي
    let currentShift=null; // {id, ...} la vacanza... il turno aperto del cassiere
    let shiftTimer=null;

    const $ = id => document.getElementById(id);
    // assegna il logo (base64) alle immagini
    (function setLogos(){ const a=$('login-logo'),b=$('header-logo'); if(a)a.src=LOGO; if(b)b.src=LOGO; })();
    const fmt = n => Math.abs(n||0).toLocaleString('en-US',{maximumFractionDigits:0});
    // Orario sempre su fuso del Cairo (Egitto), 24h, cifre occidentali — calcolato da noi, NON dipende dal browser
    const TZ='Africa/Cairo';
    // ultimo <weekday> del mese (per le regole DST egiziane)
    function _lastWeekday(y,month,wd){ const last=new Date(Date.UTC(y,month+1,0)); const ld=last.getUTCDay(); const diff=(ld-wd+7)%7; return last.getUTCDate()-diff; }
    // offset Egitto (minuti) calcolato da noi: DST (+3) dall'ultimo venerdì di aprile all'ultimo giovedì di ottobre; altrimenti +2
    function tzOffsetMin(ts){
      const d=new Date(ts), y=d.getUTCFullYear();
      const aprDay=_lastWeekday(y,3,5);   // ultimo venerdì di aprile
      const octDay=_lastWeekday(y,9,4);   // ultimo giovedì di ottobre
      const dstStart=Date.UTC(y,3,aprDay,0,0,0)-120*60000;
      const dstEnd=Date.UTC(y,9,octDay,24,0,0)-180*60000;
      return (ts>=dstStart && ts<dstEnd)?180:120;
    }
    const _p2=n=>String(n).padStart(2,'0');
    // formatta usando un offset CONGELATO (salvato al momento della fattura) — così l'ora resta corretta per sempre
    function fmtFromOff(ts, off){ const d=new Date(ts+off*60000); return `${_p2(d.getUTCDate())}/${_p2(d.getUTCMonth()+1)}/${d.getUTCFullYear()}, ${_p2(d.getUTCHours())}:${_p2(d.getUTCMinutes())}`; }
    function fmtFromOffShort(ts, off){ const d=new Date(ts+off*60000); return `${_p2(d.getUTCHours())}:${_p2(d.getUTCMinutes())} · ${_p2(d.getUTCDate())}/${_p2(d.getUTCMonth()+1)}`; }
    // se è disponibile l'offset congelato (tzo) lo usa, altrimenti calcola il fuso del Cairo per quell'istante
    const fmtDT = (ts, tzo) => fmtFromOff(ts, (tzo!=null)?tzo:tzOffsetMin(ts));
    const fmtDate = (ts, tzo) => { const off=(tzo!=null)?tzo:tzOffsetMin(ts); const d=new Date(ts+off*60000); return `${_p2(d.getUTCDate())}/${_p2(d.getUTCMonth()+1)}/${d.getUTCFullYear()}`; };
    function toast(m, err=false){ $('toast-root').innerHTML=`<div class="toast ${err?'err':''}">${err?'⚠':'✓'} ${m}</div>`; setTimeout(()=>$('toast-root').innerHTML='',2400); }
    function closeSheet(){ $('sheet-root').innerHTML=''; }

    // ============ LOGIN ============
    function refreshLoginLabels(){
      $('l-email-lbl').textContent=t('email'); $('l-pass-lbl').textContent=t('pass');
      $('login-btn').textContent=t('login');
    }
    $('login-lang').onclick=toggleLang;
    $('login-btn').onclick=async()=>{
      const email=$('login-email').value.trim(), pass=$('login-pass').value;
      $('login-error').textContent='';
      if(!email||!pass){$('login-error').textContent=t('required');return;}
      $('login-btn').textContent='...';
      try{ await signInWithEmailAndPassword(auth,email,pass); }
      catch(e){ $('login-error').textContent=t('loginErr'); $('login-btn').textContent=t('login'); }
    };
    $('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')$('login-btn').click();});

    // ============ AUTH STATE ============
    onAuthStateChanged(auth, async u=>{
      if(!u){ user=null; profile=null; clearInterval(window.__custTimer); $('login-screen').classList.remove('hidden'); $('app').classList.add('hidden'); return; }
      user=u;
      try{
        const snap=await getDoc(doc(db,'users',u.uid));
        if(!snap.exists()){ $('login-error').textContent=t('noProfile'); await signOut(auth); $('login-btn').textContent=t('login'); return; }
        profile=snap.data();
        if(profile.active===false){ $('login-error').textContent=t('inactive'); await signOut(auth); $('login-btn').textContent=t('login'); return; }
        await loadBranches();
        if(branches.length===0){ $('login-error').textContent=t('noBranch'); await signOut(auth); $('login-btn').textContent=t('login'); return; }
        currentBranchId=branches[0].id;
        await loadMyOpenShift(); // se c'è un turno aperto, blocca la filiale su quella del turno
        $('login-screen').classList.add('hidden'); $('app').classList.remove('hidden');
        $('login-btn').textContent=t('login');
        setupChrome();
        await loadCatalog();
        await loadInstapayCfg(); // إعداد Instapay (يستخدمه الكاشير في الدفع)
        render();
        checkPendingCustody(); // فحص فوري للعُهد المستنية
        clearInterval(window.__custTimer); window.__custTimer=setInterval(checkPendingCustody,15000); // شبه فوري كل 15 ثانية
      }catch(e){ console.error(e); $('login-error').textContent=t('errorGen'); await signOut(auth); }
    });

    // ============ DATA LOADERS ============
    async function loadBranches(){
      branches=[];
      if(profile.role==='admin'){
        const qs=await getDocs(query(collection(db,'branches'),where('active','==',true)));
        qs.forEach(d=>branches.push({id:d.id,...d.data()}));
      } else {
        for(const bid of (profile.branchIds||[])){
          const bs=await getDoc(doc(db,'branches',bid));
          if(bs.exists()&&bs.data().active!==false) branches.push({id:bs.id,...bs.data()});
        }
      }
    }
    // turno aperto del cassiere (in qualsiasi filiale) — definisce la filiale di lavoro
    async function loadMyOpenShift(){
      myShift=null;
      try{
        const qs=await getDocs(query(collection(db,'shifts'),where('userId','==',user.uid),where('status','==','open')));
        qs.forEach(d=>{ if(!myShift) myShift={id:d.id,...d.data()}; });
        if(myShift && myShift.branchId){ currentBranchId=myShift.branchId; } // blocca la filiale sul turno
      }catch(e){ console.error('loadMyOpenShift',e); }
    }
    async function loadCatalog(){
      categories=[]; products=[]; inventory={};
      const cs=await getDocs(collection(db,'categories'));
      cs.forEach(d=>categories.push({id:d.id,...d.data()}));
      categories.sort((a,b)=>(a.order||0)-(b.order||0));
      const ps=await getDocs(collection(db,'products'));
      ps.forEach(d=>products.push({id:d.id,...d.data()}));
      const inv=await getDocs(query(collection(db,'inventory'),where('branchId','==',currentBranchId)));
      inv.forEach(d=>{ const x=d.data(); inventory[x.productId]={qty:x.qty||0,threshold:x.threshold||20,lastCost:x.lastCost||0}; });
    }
    async function loadInstapayCfg(){
      try{ const s=await getDoc(doc(db,'settings','instapay')); if(s.exists()){ const x=s.data(); instapayCfg={qrDataUrl:x.qrDataUrl||'', alias:x.alias||''}; } }catch(e){ console.warn('loadInstapayCfg',e); }
    }

    // ============ CHROME (top bar, nav) ============
    let navTabs=[]; // كل الأقسام المتاحة للدور الحالي (للقائمة)
    // قائمة الأقسام: شبكة كبيرة سهلة اللمس — توصلك لأي قسم بضغطة واحدة
    function openMenu(){
      if(!navTabs.length) return;
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('settings')}</div><div class="sheet-title">☰ ${t('sectionsMenu')}</div></div><button class="close-x" id="cx">×</button></div>
        <div class="menu-grid">
          ${navTabs.map(x=>`<button class="menu-tile ${x.k===activeTab?'active':''}" data-tab="${x.k}"><span class="mt-i">${x.ico}</span><span class="mt-l">${x.l}</span></button>`).join('')}
        </div>
      </div></div>`;
      $('ov').onclick=closeSheet; $('cx').onclick=closeSheet;
      document.querySelectorAll('.menu-tile').forEach(b=>b.onclick=()=>{
        activeTab=b.dataset.tab; closeSheet();
        document.querySelectorAll('.nav-btn').forEach(x=>x.classList.toggle('active',x.dataset.tab===activeTab));
        const av=document.querySelector('.nav-btn.active'); if(av) av.scrollIntoView({inline:'center',block:'nearest'});
        render();
      });
    }
    function setupChrome(){
      applyLang();
      $('lang-btn').onclick=toggleLang;
      const bs=$('branch-select');
      bs.innerHTML=branches.map(b=>`<option value="${b.id}">${lang==='ar'?b.nameAr:b.nameEn}</option>`).join('');
      bs.value=currentBranchId;
      bs.onchange=async()=>{ if(myShift){ bs.value=currentBranchId; toast(t('branchLocked'),true); return; } currentBranchId=bs.value; await loadCatalog(); render(); };
      applyBranchLock();
      $('user-btn').onclick=openSettings;
      $('menu-btn')&&($('menu-btn').onclick=openMenu);
      // nav depends on role
      const tabs=[];
      if(profile.role==='admin'||profile.role==='manager') tabs.push({k:'dashboard',ico:'📈',l:t('dashboard_tab')});
      tabs.push({k:'cassa',ico:'🛒',l:t('cashier_tab')});
      tabs.push({k:'shift',ico:'🕐',l:t('shift_tab')});
      tabs.push({k:'receipts',ico:'🧾',l:t('receipts_tab')});
      if(profile.role==='admin'||profile.role==='manager'){
        tabs.push({k:'products',ico:'📦',l:t('products')});
        tabs.push({k:'categories',ico:'🏷️',l:t('categories')});
        tabs.push({k:'warehouse',ico:'🏬',l:t('warehouse')});
        tabs.push({k:'suppliers',ico:'🚚',l:t('suppliers_tab')});
        tabs.push({k:'users',ico:'👥',l:t('users')});
        tabs.push({k:'staff',ico:'👀',l:t('staff_tab')});
        tabs.push({k:'reports',ico:'📊',l:t('reports')});
      }
      if(profile.role==='admin') tabs.push({k:'branches',ico:'🏢',l:t('branches_tab')});
      // landing page: الكاشير يفتح على الوردية، المدير/الأدمن على لوحة التحكم
      if(profile.role==='cashier') activeTab='shift';
      else activeTab='dashboard';
      navTabs=tabs; // عشان قائمة الأقسام تستخدمها
      $('nav-inner').style.gridTemplateColumns=`repeat(${tabs.length},1fr)`;
      $('nav-inner').innerHTML=tabs.map(x=>`<button class="nav-btn ${x.k===activeTab?'active':''}" data-tab="${x.k}"><span class="ico">${x.ico}</span><span class="lbl2">${x.l}</span></button>`).join('');
      document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab;document.querySelectorAll('.nav-btn').forEach(x=>x.classList.toggle('active',x===b));b.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});render();});
      const av=document.querySelector('.nav-btn.active'); if(av) av.scrollIntoView({inline:'center',block:'nearest'});
    }

    // blocca/sblocca il selettore filiale in alto in base al turno aperto
    function applyBranchLock(){
      const bs=$('branch-select'); if(!bs) return;
      if(myShift){ bs.value=myShift.branchId; bs.style.opacity='0.6'; bs.title=t('branchLocked'); }
      else { bs.style.opacity='1'; bs.title=''; }
    }
    function render(){
      // refresh nav labels & branch names for language
      const bs=$('branch-select'); if(bs){const cur=bs.value;bs.innerHTML=branches.map(b=>`<option value="${b.id}">${lang==='ar'?b.nameAr:b.nameEn}</option>`).join('');bs.value=cur;}
      document.querySelectorAll('.nav-btn').forEach(b=>{const k=b.dataset.tab;b.querySelector('.lbl2').textContent=k==='dashboard'?t('dashboard_tab'):k==='cassa'?t('cashier_tab'):k==='shift'?t('shift_tab'):k==='receipts'?t('receipts_tab'):k==='products'?t('products'):k==='categories'?t('categories'):k==='warehouse'?t('warehouse'):k==='suppliers'?t('suppliers_tab'):k==='users'?t('users'):k==='staff'?t('staff_tab'):k==='reports'?t('reports'):k==='branches'?t('branches_tab'):t('cashier_tab');});
      if(activeTab==='cassa') renderCassa();
      else { const cb=$('cart-bar-root'); if(cb) cb.innerHTML=''; 
        if(activeTab==='dashboard') renderDashboard();
        else if(activeTab==='products') renderProducts();
        else if(activeTab==='categories') renderCategories();
        else if(activeTab==='warehouse') renderWarehouse();
        else if(activeTab==='suppliers') renderSuppliers();
        else if(activeTab==='shift') renderShift();
        else if(activeTab==='receipts') renderReceipts();
        else if(activeTab==='users') renderUsers();
        else if(activeTab==='staff') renderStaff();
        else if(activeTab==='reports') renderReports();
        else if(activeTab==='branches') renderBranches();
        else renderCassa();
      }
    }

    // ============ CASSA / CASHIER (vendita) ============
    let cart=[]; // {id,name,price,photoUrl,qty}
    let posCatFilter='all';
    let cartExpanded=true; // il pannello carrello si apre dal basso e cresce mentre aggiungi
    function cartCount(){ return cart.reduce((s,i)=>s+i.qty,0); }
    function cartTotal(){ return cart.reduce((s,i)=>s+i.price*i.qty,0); }
    function addToCart(p){
      const inv=inventory[p.id]||{qty:0};
      const existing=cart.find(i=>i.id===p.id);
      const inCart=existing?existing.qty:0;
      if(inCart+1>(inv.qty||0)){ toast(t('outOfStock'),true); return; }
      if(existing) existing.qty++;
      else cart.push({id:p.id,name:p.name,price:p.price,photoUrl:p.photoUrl||'',qty:1});
      beep(); // صوت زي السوبر ماركت عند إضافة منتج للبيع
      cartExpanded=true; // si apre/cresce dal basso
      renderCartBar();
    }
    function setQty(id,delta){
      const it=cart.find(i=>i.id===id); if(!it)return;
      const inv=inventory[id]||{qty:0};
      const nv=it.qty+delta;
      if(nv<=0){ cart=cart.filter(i=>i.id!==id); }
      else if(nv>(inv.qty||0)){ toast(t('outOfStock'),true); return; }
      else it.qty=nv;
      renderCartBar();
    }
    function renderCartBar(){
      const root=$('cart-bar-root'); if(!root) return;
      if(cart.length===0){ root.innerHTML=''; return; }
      if(!cartExpanded){
        // barra sottile (cliccare per espandere)
        root.innerHTML=`<div class="cart-bar"><div class="cart-inner" id="open-cart">
          <span style="display:flex;align-items:center;gap:10px;"><span class="cart-count">${cartCount()}</span><span style="font-size:13px;">${t('cart')}</span></span>
          <span class="num" style="font-weight:700;font-size:16px;">${fmt(cartTotal())} ${t('currency')}</span>
        </div></div>`;
        $('open-cart').onclick=()=>{ cartExpanded=true; renderCartBar(); };
        return;
      }
      // pannello espanso con gli articoli (cresce mentre aggiungi)
      const lines=cart.map(i=>`<div class="cart-mini-line">
        ${i.photoUrl?`<img class="cl-photo" src="${i.photoUrl}" style="width:38px;height:38px;border-radius:8px;object-fit:cover;">`:`<div class="cl-photo" style="width:38px;height:38px;border-radius:8px;background:var(--ivory-dark);display:flex;align-items:center;justify-content:center;">🍽️</div>`}
        <div style="flex:1;min-width:0;"><div class="fr" dir="ltr" style="font-size:13px;font-weight:500;">${i.name}</div><div class="num" style="font-size:11px;color:var(--forest);font-weight:700;">${fmt(i.price*i.qty)} ${t('currency')}</div></div>
        <div class="qty-ctrl"><button class="qty-btn" data-dec="${i.id}">−</button><span class="num" style="min-width:18px;text-align:center;font-weight:700;">${i.qty}</span><button class="qty-btn" data-inc="${i.id}">+</button></div>
      </div>`).join('');
      root.innerHTML=`<div class="cart-bar" style="pointer-events:none;"><div class="cart-panel">
        <div class="cart-panel-head" id="cart-collapse">
          <span style="display:flex;align-items:center;gap:10px;"><span class="cart-count">${cartCount()}</span><span style="font-size:13px;">${t('cart')}</span></span>
          <span style="display:flex;align-items:center;gap:12px;"><span class="num" style="font-weight:700;font-size:16px;">${fmt(cartTotal())} ${t('currency')}</span><span style="font-size:18px;">▾</span></span>
        </div>
        <div class="cart-panel-items">${lines}</div>
        <div style="padding:10px 14px 12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="font-size:14px;font-weight:600;">${t('total')}</span><span class="num" style="font-size:20px;font-weight:700;color:var(--forest);">${fmt(cartTotal())} ${t('currency')}</span></div>
          <div style="display:flex;gap:8px;">
            <button class="btn-forest" id="do-pay" style="flex:1;padding:13px;">✓ ${t('checkout')}</button>
            <button class="btn-secondary" id="clear-cart" style="padding:13px 14px;color:var(--red);border-color:rgba(192,72,72,0.3);">🗑️</button>
          </div>
        </div>
      </div></div>`;
      $('cart-collapse').onclick=()=>{ cartExpanded=false; renderCartBar(); };
      root.querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>setQty(b.dataset.inc,1));
      root.querySelectorAll('[data-dec]').forEach(b=>b.onclick=()=>setQty(b.dataset.dec,-1));
      $('do-pay').onclick=openPaymentSheet;
      $('clear-cart').onclick=()=>{ if(!confirm(t('confirmClear')))return; cart=[]; renderCartBar(); };
    }
    // اسم المنتج حسب اللغة مع ريجوع للّغة التانية لو ناقص (يمنع اللخبطة)
    function pName(p){ if(!p) return ''; return lang==='ar' ? (p.nameAr||p.name||'') : (p.name||p.nameAr||''); }
    function pName2(p){ if(!p) return ''; return lang==='ar' ? (p.name||'') : (p.nameAr||''); } // الاسم الثانوي

    function renderCassa(){
      $('cart-bar-root')||$('content').insertAdjacentHTML('afterend','<div id="cart-bar-root"></div>');
      // الأدمن بس يقدر يبيع من غير وردية. الكاشير والمدير لازم يفتحوا وردية.
      if(!myShift && profile.role!=='admin'){
        const cb=$('cart-bar-root'); if(cb) cb.innerHTML='';
        $('content').innerHTML=`<div class="card" style="text-align:center;padding:32px 18px;">
          <div style="font-size:40px;margin-bottom:10px;">🕐</div>
          <div style="font-weight:700;font-size:16px;margin-bottom:8px;">${t('needShiftToSell')}</div>
          <button class="btn-gold btn-wide" id="go-shift" style="margin-top:10px;">🕐 ${t('openShiftNow')}</button>
        </div>`;
        const g=$('go-shift'); if(g) g.onclick=()=>{ activeTab='shift'; document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab==='shift')); render(); };
        return;
      }
      const actives=products.filter(p=>p.active!==false);
      if(actives.length===0){ $('content').innerHTML=`<div class="card"><div class="empty">${t('noProdYet')}</div></div>`; renderCartBar(); return; }
      const cats=categories.filter(c=>c.active!==false);
      const chips=`<button class="pos-cat-chip ${posCatFilter==='all'?'active':''}" data-cat="all">${t('allCats')}</button>`+
        cats.map(c=>`<button class="pos-cat-chip ${posCatFilter===c.id?'active':''}" data-cat="${c.id}">${lang==='ar'?c.nameAr:c.nameEn}</button>`).join('');
      let list=actives.filter(p=>posCatFilter==='all'||p.categoryId===posCatFilter);
      const grid=list.map(p=>{
        const inv=inventory[p.id]||{qty:0,threshold:20};
        const out=(inv.qty||0)<=0; const low=!out&&inv.qty<=(inv.threshold||20);
        const desc=lang==='ar'?(p.descAr||''):(p.descEn||'');
        return `<button class="pos-card" data-id="${p.id}" ${out?'disabled style="opacity:0.45;"':''}>
          ${p.photoUrl?`<img class="pc-photo" src="${p.photoUrl}">`:`<div class="pc-photo">🍽️</div>`}
          <div class="pc-body">
            <div class="pc-name">${pName(p)}</div>
            ${pName2(p)?`<div class="pc-desc fr" dir="ltr">${pName2(p)}</div>`:desc?`<div class="pc-desc">${desc}</div>`:`<div class="pc-desc"></div>`}
            <div class="pc-price num">${fmt(p.price)} ${t('currency')}</div>
            ${out?`<span class="pc-badge">${t('outOfStock')}</span>`:low?`<span class="pc-badge" style="background:rgba(216,142,42,0.15);color:var(--amber);">${t('lowStock')}: ${inv.qty}</span>`:''}
          </div>
        </button>`;
      }).join('');
      const scanBar = `<button id="cassa-scan" class="btn-forest btn-wide" style="margin-bottom:10px;">📷 ${t('scanBtn')}</button>`;
      $('content').innerHTML=`${scanBar}<div class="pos-cat-bar">${chips}</div><div class="pos-grid">${grid}</div>`;
      $('cassa-scan')&&($('cassa-scan').onclick=()=>smartScan('sell'));
      document.querySelectorAll('.pos-cat-chip').forEach(ch=>ch.onclick=()=>{posCatFilter=ch.dataset.cat;renderCassa();});
      document.querySelectorAll('.pos-card').forEach(c=>c.onclick=()=>{ if(c.disabled)return; addToCart(products.find(p=>p.id===c.dataset.id)); });
      renderCartBar();
    }
    function openPaymentSheet(){
      if(cart.length===0)return;
      const total=cartTotal();
      let paid=0;
      // لو مفيش وردية (الأدمن بس): يأكد فرع البيع
      const noShift = !myShift && profile.role==='admin';
      if(noShift && !saleBranchSel) saleBranchSel=currentBranchId;
      const visIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
      const visB = branches.filter(b=>visIds.includes(b.id));
      const branchRow = noShift ? `<div style="background:rgba(216,142,42,0.1);border:1px solid rgba(216,142,42,0.35);border-radius:12px;padding:12px;margin-bottom:14px;">
        <div style="font-size:12px;color:var(--amber);font-weight:700;margin-bottom:6px;">🏢 ${t('branchOfSale')}</div>
        <select class="input" id="pay-branch">${visB.map(b=>`<option value="${b.id}" ${saleBranchSel===b.id?'selected':''}>${lang==='ar'?b.nameAr:b.nameEn}</option>`).join('')}</select>
        <div style="font-size:11px;color:rgba(26,26,26,0.55);margin-top:6px;">${t('confirmBranchHint')}</div>
      </div>` : '';
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('payTitle')}</div><div class="sheet-title">${t('checkout')}</div></div><button class="close-x" id="cx">×</button></div>
        ${branchRow}
        <div style="text-align:center;margin-bottom:14px;"><div style="font-size:12px;color:rgba(26,26,26,0.55);">${t('total')}</div><div class="num" style="font-size:30px;font-weight:700;color:var(--forest);">${fmt(total)} ${t('currency')}</div></div>
        <div style="font-size:12px;color:rgba(26,26,26,0.55);margin-bottom:6px;">${t('payMethodLbl')}</div>
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <button id="pm-cash" style="flex:1;padding:12px 0;border-radius:12px;font-weight:700;font-family:inherit;cursor:pointer;border:2px solid var(--forest);background:var(--forest);color:#fff;">💵 ${t('mCash')}</button>
          <button id="pm-insta" style="flex:1;padding:12px 0;border-radius:12px;font-weight:700;font-family:inherit;cursor:pointer;border:2px solid var(--ivory-dark);background:#fff;color:var(--charcoal);">📲 ${t('mInstapay')}</button>
        </div>
        <div id="pay-cash-area">
        <button class="btn-gold btn-wide" id="pay-exact" style="margin-bottom:12px;">✓ ${t('payExact')} (${fmt(total)})</button>
        <div class="field"><label class="lbl">${t('amountPaid')}</label><input class="input num" id="pay-amount" type="number" min="0" step="0.01" dir="ltr" placeholder="${t('enterAmount')}"></div>
        <div style="display:flex;gap:6px;margin-bottom:12px;">
          ${[50,100,200,500].map(v=>`<button class="btn-secondary pay-quick" data-v="${v}" style="flex:1;padding:9px 0;">${v}</button>`).join('')}
        </div>
        <div id="pay-change" style="background:rgba(31,58,46,0.05);border-radius:12px;padding:12px;text-align:center;margin-bottom:14px;min-height:54px;display:flex;flex-direction:column;justify-content:center;">
          <div style="font-size:12px;color:rgba(26,26,26,0.55);">${t('changeDue')}</div>
          <div class="num" id="pay-change-val" style="font-size:24px;font-weight:700;color:var(--forest);">—</div>
        </div>
        </div>
        <div id="pay-insta-area" style="display:none;background:rgba(61,115,85,0.1);border-radius:12px;padding:14px;text-align:center;margin-bottom:14px;">
          <div style="font-size:13px;color:var(--green);font-weight:700;">📲 ${t('mInstapay')}</div>
          <div style="font-size:11px;color:rgba(26,26,26,0.6);margin-top:4px;">${t('instapayNote')}</div>
        </div>
        <button class="btn-forest btn-wide" id="pay-confirm">✓ ${t('confirmPay')}</button>
      </div></div>`;
      $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
      let payMethod='cash';
      const cashArea=$('pay-cash-area'), instaArea=$('pay-insta-area'), pmCash=$('pm-cash'), pmInsta=$('pm-insta');
      const setMethod=(m)=>{ payMethod=m;
        if(m==='cash'){ cashArea.style.display=''; instaArea.style.display='none';
          pmCash.style.background='var(--forest)'; pmCash.style.color='#fff'; pmCash.style.borderColor='var(--forest)';
          pmInsta.style.background='#fff'; pmInsta.style.color='var(--charcoal)'; pmInsta.style.borderColor='var(--ivory-dark)';
        } else { cashArea.style.display='none'; instaArea.style.display='';
          pmInsta.style.background='var(--green)'; pmInsta.style.color='#fff'; pmInsta.style.borderColor='var(--green)';
          pmCash.style.background='#fff'; pmCash.style.color='var(--charcoal)'; pmCash.style.borderColor='var(--ivory-dark)';
        } };
      pmCash.onclick=()=>setMethod('cash'); pmInsta.onclick=()=>setMethod('instapay');
      const pb=$('pay-branch'); if(pb) pb.onchange=()=>{ saleBranchSel=pb.value; };
      const amtEl=$('pay-amount'), changeEl=$('pay-change-val'), confirmBtn=$('pay-confirm');
      const recompute=()=>{
        paid=parseFloat(amtEl.value)||0;
        const change=paid-total;
        if(amtEl.value===''){ changeEl.textContent='—'; changeEl.style.color='var(--forest)'; $('pay-change').style.background='rgba(31,58,46,0.05)'; confirmBtn.disabled=false; return; }
        if(change<0){ changeEl.textContent=t('insufficient'); changeEl.style.fontSize='14px'; changeEl.style.color='var(--red)'; $('pay-change').style.background='rgba(192,72,72,0.08)'; confirmBtn.disabled=true; }
        else { changeEl.style.fontSize='24px'; changeEl.textContent=fmt(change)+' '+t('currency'); changeEl.style.color='var(--forest)'; $('pay-change').style.background='rgba(61,115,85,0.1)'; confirmBtn.disabled=false; }
      };
      amtEl.oninput=recompute;
      $('pay-exact').onclick=()=>{ amtEl.value=total; recompute(); };
      $('sheet-root').querySelectorAll('.pay-quick').forEach(b=>b.onclick=()=>{ amtEl.value=(parseFloat(amtEl.value)||0)+Number(b.dataset.v); recompute(); });
      confirmBtn.onclick=()=>{ if(payMethod==='instapay'){ openInstapayPay(total); return; } const p=amtEl.value===''?total:(parseFloat(amtEl.value)||0); if(p<total){ toast(t('insufficient'),true); return; } doCheckout(p,'cash'); };
    }
    // شاشة الـ QR للعميل: امسح، ادفع، الكاشير يضغط "تم الاستلام" → كاميرا → أو "تأكيد بدون صورة"
    function openInstapayPay(total){
      const hasQr = !!instapayCfg.qrDataUrl;
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">📲 ${t('mInstapay')}</div><div class="sheet-title">${t('instapayShowTitle')}</div></div><button class="close-x" id="cx">×</button></div>
        <div style="text-align:center;background:rgba(31,58,46,0.06);border-radius:12px;padding:14px;margin-bottom:12px;">
          <div style="font-size:13px;color:rgba(26,26,26,0.6);margin-bottom:4px;">${t('amountToPay')}</div>
          <div class="num" style="font-size:30px;font-weight:800;color:var(--forest);">${fmt(total)} ${t('currency')}</div>
        </div>
        ${hasQr?`<div style="text-align:center;background:#fff;border:1px solid var(--ivory-dark);border-radius:12px;padding:14px;margin-bottom:10px;">
          <img src="${instapayCfg.qrDataUrl}" style="max-width:280px;width:100%;height:auto;border-radius:8px;">
          ${instapayCfg.alias?`<div class="num" style="font-size:13px;font-weight:700;margin-top:8px;color:var(--charcoal);">${instapayCfg.alias}</div>`:''}
          <div style="font-size:12px;color:rgba(26,26,26,0.6);margin-top:6px;">${t('instapayHint')}</div>
        </div>`:`<div class="card" style="background:rgba(192,72,72,0.08);text-align:center;color:var(--red);">⚠️ ${t('noQrSet')}</div>`}
        <button class="btn-forest btn-wide" id="ipay-cam" style="padding:14px;">📷 ${t('takeProof')} — ${t('received')}</button>
        <button class="btn-secondary btn-wide" id="ipay-skip" style="margin-top:8px;padding:12px;">${t('skipPhoto')}</button>
        <input type="file" id="ipay-photo" accept="image/*" capture="environment" class="hidden">
      </div></div>`;
      $('ov').onclick=closeSheet; $('cx').onclick=closeSheet;
      $('ipay-cam').onclick=()=>$('ipay-photo').click();
      $('ipay-skip').onclick=()=>doCheckout(total,'instapay',null);
      $('ipay-photo').onchange=async e=>{
        const f=e.target.files&&e.target.files[0]; if(!f) return;
        const b=$('ipay-cam'); b.disabled=true; b.textContent='...';
        try{ const dataUrl=await compress(f,800,0.7); doCheckout(total,'instapay',dataUrl); }
        catch(err){ console.error(err); toast(t('errorGen'),true); b.disabled=false; b.textContent='📷 '+t('takeProof'); }
      };
    }
    async function doCheckout(paid, payMethod, payProofDataUrl){
      if(cart.length===0)return;
      if(!myShift && profile.role!=='admin'){ toast(t('needShiftToSell'),true); closeSheet(); return; } // الأدمن بس يبيع من غير وردية
      payMethod = payMethod==='instapay' ? 'instapay' : 'cash';
      const saleBranchId = myShift ? (myShift.branchId||currentBranchId) : (saleBranchSel||currentBranchId); // فرع الوردية أو الفرع المؤكَّد
      const saleShiftId = myShift ? myShift.id : null;
      const cb=$('pay-confirm'); if(cb){ cb.textContent='...'; cb.disabled=true; }
      try{
        const items=cart.map(i=>({productId:i.id,name:i.name,price:i.price,qty:i.qty,subtotal:i.price*i.qty}));
        const total=cartTotal();
        const createdAt=Date.now();
        const tzo=tzOffsetMin(createdAt); // congela l'offset (estate/inverno) al momento della fattura
        const receiptNo=Number(String(createdAt).slice(-6)); // numero fattura stabile
        // Instapay: pagamento esatto online (niente resto, non entra nel cash)
        const paidAmt = payMethod==='instapay' ? total : ((paid==null||isNaN(paid))?total:paid);
        const change = payMethod==='instapay' ? 0 : Math.max(0,paidAmt-total);
        // 1) registra la vendita (legata al turno + filiale del turno) con il metodo di pagamento
        const ref=await addDoc(collection(db,'sales'),{
          branchId:saleBranchId, shiftId:saleShiftId, userId:user.uid, userName:profile.name||user.email,
          items, total, count:cartCount(), receiptNo, paid:paidAmt, change, payMethod, payProof:payProofDataUrl||'', createdAt, tzo
        });
        // 2) scala l'inventario del branch di vendita
        const sameBranch = (saleBranchId===currentBranchId);
        for(const i of cart){
          let cur;
          if(sameBranch){ cur=inventory[i.id]||{qty:0,threshold:20,lastCost:0}; }
          else { const snap=await getDoc(doc(db,'inventory',`${saleBranchId}_${i.id}`)); cur=snap.exists()?snap.data():{qty:0,threshold:20,lastCost:0}; }
          const nq=Math.max(0,(cur.qty||0)-i.qty);
          await setDoc(doc(db,'inventory',`${saleBranchId}_${i.id}`),{branchId:saleBranchId,productId:i.id,qty:nq,threshold:cur.threshold||20,lastCost:cur.lastCost||0},{merge:true});
          if(sameBranch) inventory[i.id]={qty:nq,threshold:cur.threshold||20,lastCost:cur.lastCost||0};
        }
        const sale={id:ref.id,branchId:saleBranchId,shiftId:saleShiftId,userName:profile.name||user.email,items,total,count:cartCount(),receiptNo,paid:paidAmt,change,payMethod,payProof:payProofDataUrl||'',createdAt,tzo};
        cart=[]; closeSheet(); renderCassa(); toast(t('saleDone'));
        showReceipt(sale); // mostra la fattura automaticamente
      }catch(e){ console.error(e); toast(t('errorGen'),true); if(cb){ cb.textContent='✓ '+t('confirmPay'); cb.disabled=false; } }
    }

    // ============ RICEVUTE / الفواتير (receipts) ============
    function receiptBranchName(bid){ const b=branches.find(x=>x.id===bid); return b?(lang==='ar'?b.nameAr:b.nameEn):''; }
    // يبني نص الفاتورة ويفتح واتساب (العميل يختار جهة الاتصال)
    // يرسم الفاتورة كصورة (Canvas) فيها اللوجو وكل التفاصيل، ويشاركها أو ينزّلها PNG
    function receiptToImage(sale, bn, dt, btn){
      const btnLabel = btn ? btn.textContent : '';
      const W=620, pad=34, ar=(lang==='ar');
      // قياس الارتفاع المطلوب
      const items=sale.items||[];
      const lineH=46, headH=250;
      const net=Math.max(0,(sale.total||0)-(sale.refundTotal||0));
      const extra=(sale.paid!=null?56:0)+((sale.refundTotal>0||sale.voided)?56:0);
      const H=headH + items.length*lineH + 150 + extra;
      const c=document.createElement('canvas'); c.width=W; c.height=H;
      const x=c.getContext('2d');
      // خلفية
      x.fillStyle='#FAF6EE'; x.fillRect(0,0,W,H);
      // شريط أخضر علوي
      x.fillStyle='#1F3A2E'; x.fillRect(0,0,W,150);
      // اللوجو في النص
      try{ const lw=110, lh=logoImg.height?logoImg.width? lw*(logoImg.height/logoImg.width):lw:lw; x.drawImage(logoImg,(W-lw)/2,24,lw,lh); }catch(e){}
      // الفرع
      x.fillStyle='#E0C880'; x.font='bold 22px Arial'; x.textAlign='center';
      x.fillText(bn||'Le Coin', W/2, 178);
      // رقم وتاريخ
      x.fillStyle='#1A1A1A'; x.font='15px Arial';
      x.fillText(`${t('receiptNo')}: #${sale.receiptNo||''}`, W/2, 204);
      x.fillStyle='rgba(26,26,26,0.6)'; x.font='13px Arial';
      x.fillText(dt, W/2, 226);
      // خط فاصل
      let y=252; x.strokeStyle='#E0DCCD'; x.lineWidth=1.5; x.beginPath(); x.moveTo(pad,y); x.lineTo(W-pad,y); x.stroke();
      // العناصر
      y+=14;
      const startX = ar ? W-pad : pad;      // جهة الاسم
      const endX   = ar ? pad   : W-pad;     // جهة السعر
      items.forEach(it=>{
        y+=lineH;
        x.fillStyle='#1A1A1A'; x.font='600 16px Arial';
        x.textAlign = ar ? 'right' : 'left'; x.fillText(it.name, startX, y-12);
        x.fillStyle='rgba(26,26,26,0.55)'; x.font='13px Arial';
        x.fillText(`${it.qty} × ${fmt(it.price)}`, startX, y+8);
        x.fillStyle='#1A1A1A'; x.font='bold 16px Arial';
        x.textAlign = ar ? 'left' : 'right'; x.fillText(`${fmt(it.subtotal)} ${t('currency')}`, endX, y-12);
        x.strokeStyle='#EFE9DB'; x.beginPath(); x.moveTo(pad,y+18); x.lineTo(W-pad,y+18); x.stroke();
      });
      // الإجمالي
      y+=lineH+6;
      x.fillStyle='#1F3A2E'; x.font='bold 19px Arial';
      x.textAlign = ar ? 'right' : 'left'; x.fillText(t('total'), startX, y);
      x.textAlign = ar ? 'left' : 'right'; x.font='bold 26px Arial'; x.fillText(`${fmt(net)} ${t('currency')}`, endX, y);
      // مدفوع/باقي
      if(sale.paid!=null){
        y+=40; x.fillStyle='rgba(26,26,26,0.6)'; x.font='14px Arial';
        x.textAlign = ar ? 'right' : 'left'; x.fillText(`${t('received')}: ${fmt(sale.paid)} ${t('currency')}`, startX, y);
        x.textAlign = ar ? 'left' : 'right'; x.fillText(`${t('changeDue')}: ${fmt(sale.change||0)} ${t('currency')}`, endX, y);
      }
      // ملغاة/مرتجعة
      if(sale.refundTotal>0||sale.voided){
        y+=44; x.fillStyle='#C04848'; x.font='bold 15px Arial'; x.textAlign='center';
        x.fillText(`${sale.voided?t('voidedLbl'):t('refundedLbl')} − ${fmt(sale.refundTotal||0)} ${t('currency')}`, W/2, y);
      }
      // شكراً
      y+=54; x.fillStyle='#C9A84C'; x.font='italic 18px Georgia, serif'; x.textAlign='center';
      x.fillText(t('thankYou'), W/2, y);
      // إخراج: اعرض الصورة في نافذة فيها واتساب + تحميل
      const fname=`receipt_${sale.receiptNo||'lecoin'}.png`;
      const dataUrl=c.toDataURL('image/png');
      if(btn){ btn.disabled=false; btn.textContent=btnLabel; }
      // نحوّل الصورة لـ Blob فوراً (بدون انتظار) عشان التحميل/المشاركة مايتمنعوش من المتصفح
      const imgBlob=(()=>{ try{ const b64=dataUrl.split(',')[1]; const bin=atob(b64); const arr=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i); return new Blob([arr],{type:'image/png'}); }catch(e){ return null; } })();
      const blobUrl=imgBlob?URL.createObjectURL(imgBlob):dataUrl;
      const doDownload=()=>{ const a=document.createElement('a'); a.href=blobUrl; a.download=fname; document.body.appendChild(a); a.click(); setTimeout(()=>document.body.removeChild(a),100); };
      $('sheet-root').innerHTML=`<div class="overlay" id="ov2"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('imgReady')}</div><div class="sheet-title">🧾 ${t('receiptImage')}</div></div><button class="close-x" id="cx2">×</button></div>
        <div style="text-align:center;margin-bottom:14px;"><img src="${dataUrl}" alt="receipt" style="max-width:100%;border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,0.15);"></div>
        <button class="btn-wide" id="rci-wa" style="background:#25D366;color:#fff;border:none;border-radius:12px;font-weight:700;font-family:inherit;padding:13px;cursor:pointer;margin-bottom:8px;">📱 ${t('shareWa')}</button>
        <button class="btn-secondary btn-wide" id="rci-dl">⬇️ ${t('saveImg')}</button>
        <div style="font-size:11px;color:rgba(26,26,26,0.5);text-align:center;margin-top:8px;">${t('attachHint')}</div>
      </div></div>`;
      const back=()=>showReceipt(sale);
      $('ov2').onclick=back; $('cx2').onclick=back;
      // تحميل مباشر — يشتغل على كل الأجهزة (بدون انتظار = المتصفح مايمنعهوش)
      $('rci-dl').onclick=()=>{ doDownload(); toast(t('exportDone')); };
      // مشاركة: موبايل => مشاركة الصورة مباشرة؛ كمبيوتر => تنزيل + فتح واتساب ويب
      $('rci-wa').onclick=()=>{
        const file=imgBlob?new File([imgBlob],fname,{type:'image/png'}):null;
        if(file && navigator.canShare && navigator.canShare({files:[file]})){
          navigator.share({files:[file], title:'Le Coin', text:t('thankYou')}).catch(()=>{});
        } else {
          doDownload();                                   // نزّل الصورة فوراً
          setTimeout(()=>window.open('https://web.whatsapp.com/','_blank'),300);
          toast(t('attachHint'));
        }
      };
    }
    function sendReceiptWhatsapp(sale,bn,dt){

      L.push(t('receiptNo')+': #'+(sale.receiptNo||''));

      (sale.items||[]).forEach(i=>{ L.push(`${i.name}  ${i.qty} x ${fmt(i.price)} = ${fmt(i.subtotal)} ${t('currency')}`); });
      L.push('----------------------');
      const net=Math.max(0,(sale.total||0)-(sale.refundTotal||0));

    function showReceipt(sale){

        <div style="text-align:center;margin-bottom:12px;"><img src="${LOGO}" alt="Le Coin" style="max-width:130px;width:55%;border-radius:12px;"></div>

        ${(sale.paid!=null)?`<div style="display:flex;justify-content:space-between;font-size:12px;color:rgba(26,26,26,0.6);padding:2px 0;"><span>${t('received')}</span><span class="num">${fmt(sale.paid)} ${t('currency')}</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:rgba(26,26,26,0.6);padding:2px 0;"><span>${t('changeDue')}</span><span class="num" style="font-weight:700;">${fmt(sale.change||0)} ${t('currency')}</span></div>`:''}
        ${(sale.refundTotal>0||sale.voided)?`<div style="background:rgba(192,72,72,0.08);border-radius:10px;padding:8px 12px;margin:4px 0 8px;font-size:12px;">
          <div style="display:flex;justify-content:space-between;"><span style="color:var(--red);font-weight:700;">${sale.voided?t('voidedLbl'):t('refundedLbl')}</span><span class="num" style="color:var(--red);font-weight:700;">− ${fmt(sale.refundTotal||0)} ${t('currency')}</span></div>
          <div style="display:flex;justify-content:space-between;margin-top:3px;"><span style="font-weight:700;">${t('netTotal')}</span><span class="num" style="font-weight:700;color:var(--forest);">${fmt(Math.max(0,(sale.total||0)-(sale.refundTotal||0)))} ${t('currency')}</span></div>

        ${sale.payProof?`<div style="margin:8px 0;text-align:center;"><div style="font-size:11px;color:rgba(26,26,26,0.55);margin-bottom:4px;">📲 ${t('payProofLbl')}</div><img src="${sale.payProof}" style="max-width:200px;width:60%;height:auto;border-radius:8px;border:1px solid var(--ivory-dark);cursor:pointer;" onclick="window.open(this.src,'_blank')"></div>`:''}

        downloadCSV(`receipt_${sale.receiptNo||''}.csv`,header,rws);

      if(canRefund()&&!sale.voided){

    function canRefund(){ return profile && (profile.role==='admin'||profile.role==='manager'); }
    // quantità già resa per prodotto in questa vendita
    function returnedQtyOf(sale,pid){ let q=0; (sale.returns||[]).forEach(r=>(r.lines||[]).forEach(l=>{ if(l.productId===pid)q+=l.qty; })); return q; }
    async function restoreStock(pid,qty){
      const cur=inventory[pid]||{qty:0,threshold:20,lastCost:0};
      const nq=(cur.qty||0)+qty;
      await setDoc(doc(db,'inventory',`${currentBranchId}_${pid}`),{branchId:currentBranchId,productId:pid,qty:nq,threshold:cur.threshold||20,lastCost:cur.lastCost||0},{merge:true});
      inventory[pid]={qty:nq,threshold:cur.threshold||20,lastCost:cur.lastCost||0};
    }
    async function doVoid(sale){
      if(sale.voided){ toast(t('alreadyVoided'),true); return; }
      if(!confirm(t('confirmVoid'))) return;
      try{
        // rimetti in stock tutta la quantità non ancora resa
        const lines=[];
        for(const it of (sale.items||[])){
          const remain=it.qty-returnedQtyOf(sale,it.productId);
          if(remain>0){ await restoreStock(it.productId,remain); lines.push({productId:it.productId,name:it.name,qty:remain,price:it.price,amount:remain*it.price,toStock:true}); }
        }
        const ev={at:Date.now(),byName:profile.name||user.email,type:'void',lines,amount:lines.reduce((a,l)=>a+l.amount,0)};
        const returns=[...(sale.returns||[]),ev];
        const refundTotal=sale.total||0; // storno totale
        await updateDoc(doc(db,'sales',sale.id),{voided:true,refundTotal,returns});
        sale.voided=true; sale.refundTotal=refundTotal; sale.returns=returns;
        toast(t('returnDone')); showReceipt(sale);
      }catch(e){ console.error(e); toast(t('errorGen'),true); }
    }
    function returnForm(sale){
      // righe con quantità ancora restituibile
      const avail=(sale.items||[]).map(it=>({...it,remain:it.qty-returnedQtyOf(sale,it.productId)})).filter(it=>it.remain>0);
      if(avail.length===0){ toast(t('nothingToReturn'),true); return; }
      const toStock={}; avail.forEach(it=>toStock[it.productId]=true);
      const rows=avail.map(it=>`<div style="padding:9px 0;border-bottom:1px solid var(--ivory-dark);">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
          <div style="flex:1;min-width:0;"><div class="fr" dir="ltr" style="font-size:14px;">${it.name}</div><div class="num" style="font-size:11px;color:rgba(26,26,26,0.5);">${fmt(it.price)} ${t('currency')} · ${t('returnedSoFar')}: ${returnedQtyOf(sale,it.productId)}/${it.qty}</div></div>
          <input class="input num" id="rt-${it.productId}" data-pid="${it.productId}" type="number" min="0" max="${it.remain}" dir="ltr" value="0" style="width:70px;padding:7px;">
        </div>
        <label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px;color:rgba(26,26,26,0.6);cursor:pointer;"><input type="checkbox" id="st-${it.productId}" data-pid="${it.productId}" checked> ${t('backToStock')}</label>
      </div>`).join('');
      $('sheet-root').innerHTML=`<div class="overlay" id="ov2"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">#${sale.receiptNo||''}</div><div class="sheet-title">↩️ ${t('returnItems')}</div></div><button class="close-x" id="cx2">×</button></div>
        <div style="font-size:12px;color:rgba(26,26,26,0.55);margin-bottom:8px;">${t('selectReturnQty')}</div>
        <button class="btn-secondary btn-wide" id="rt-scan" style="margin-bottom:10px;">📷 ${t('scanToReturn')}</button>
        ${rows}
        <div id="rt-sum" style="margin:12px 0;font-size:14px;font-weight:700;text-align:center;"></div>
        <button class="btn-forest btn-wide" id="rt-do">↩️ ${t('doReturn')}</button>
      </div></div>`;
      $('ov2').onclick=()=>showReceipt(sale); $('cx2').onclick=()=>showReceipt(sale);
      const recompute=()=>{
        let amt=0; avail.forEach(it=>{ const q=parseInt($('rt-'+it.productId).value)||0; amt+=q*it.price; });
        $('rt-sum').innerHTML=`${t('refundedAmount')}: <span class="num" style="color:var(--red);">${fmt(amt)} ${t('currency')}</span>`;
      };
      avail.forEach(it=>$('rt-'+it.productId).oninput=recompute); recompute();
      $('rt-scan')&&($('rt-scan').onclick=()=>smartScan('refund',{avail,recompute}));
      $('rt-do').onclick=async()=>{
        const lines=[];
        for(const it of avail){
          let q=parseInt($('rt-'+it.productId).value)||0; if(q<=0)continue; if(q>it.remain)q=it.remain;
          const back=$('st-'+it.productId).checked;
          if(back) await restoreStock(it.productId,q);
          lines.push({productId:it.productId,name:it.name,qty:q,price:it.price,amount:q*it.price,toStock:back});
        }
        if(lines.length===0){ toast(t('nothingToReturn'),true); return; }
        const b=$('rt-do'); b.disabled=true; b.textContent='...';
        try{
          const ev={at:Date.now(),byName:profile.name||user.email,type:'return',lines,amount:lines.reduce((a,l)=>a+l.amount,0)};
          const returns=[...(sale.returns||[]),ev];
          const refundTotal=(sale.refundTotal||0)+ev.amount;
          const totalQty=(sale.items||[]).reduce((a,i)=>a+i.qty,0);
          const retQty=returns.reduce((a,r)=>a+r.lines.reduce((x,l)=>x+l.qty,0),0);
          const voided=retQty>=totalQty; // se tutto reso => annullata
          await updateDoc(doc(db,'sales',sale.id),{returns,refundTotal,voided});
          sale.returns=returns; sale.refundTotal=refundTotal; sale.voided=voided;
          toast(t('returnDone')); showReceipt(sale);
        }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='↩️ '+t('doReturn'); }
      };

    let receiptsCache=[]; // vendite caricate per il filtraggio

      ['rcf-q','rcf-min','rcf-max'].forEach(id=>$(id)&&($(id).oninput=apply));
      ['rcf-from','rcf-to'].forEach(id=>$(id)&&($(id).onchange=apply));

    function renderReceiptsList(){
      const f=rcFilter;
      const fromTs=f.from?new Date(f.from+'T00:00:00').getTime():null;
      const toTs=f.to?new Date(f.to+'T23:59:59').getTime():null;
      const minV=f.min!==''?parseFloat(f.min):null;
      const maxV=f.max!==''?parseFloat(f.max):null;
      let list=receiptsCache.filter(s=>{
        if(!f.showVoided && s.voided) return false; // الفواتير الملغاة مخفية افتراضياً
        if(f.q && !String(s.receiptNo||'').includes(f.q.replace('#',''))) return false;
        if(fromTs && (s.createdAt||0)<fromTs) return false;
        if(toTs && (s.createdAt||0)>toTs) return false;
        if(f.cashier && s.userName!==f.cashier) return false;
        const net=Math.max(0,(s.total||0)-(s.refundTotal||0));
        if(minV!=null && net<minV) return false;
        if(maxV!=null && net>maxV) return false;
        return true;
      });
      const totNet=list.reduce((a,s)=>a+Math.max(0,(s.total||0)-(s.refundTotal||0)),0);
      const box=$('rcpt-list'); if(!box)return;
      let html=`<div style="display:flex;justify-content:space-between;padding:6px 4px 10px;font-size:12px;color:rgba(26,26,26,0.6);"><span>${t('results')}: <b class="num">${list.length}</b></span><span>${t('netSum')}: <b class="num" style="color:var(--forest);">${fmt(totNet)} ${t('currency')}</b></span></div>`;
      if(list.length===0) html+=`<div class="card"><div class="empty">${t('noSales')}</div></div>`;
      else html+=`<div class="card">`+list.slice(0,200).map(s=>{
        const net=Math.max(0,(s.total||0)-(s.refundTotal||0));
        const badge = s.voided?`<span style="font-size:10px;color:var(--red);font-weight:700;border:1px solid rgba(192,72,72,0.4);border-radius:6px;padding:1px 6px;">${t('voidedLbl')}</span>`
          : (s.refundTotal>0?`<span style="font-size:10px;color:var(--amber);font-weight:700;border:1px solid rgba(216,142,42,0.4);border-radius:6px;padding:1px 6px;">${t('refundedLbl')}</span>`:'');
        const payBadge = s.payMethod==='instapay'?`<span style="font-size:10px;color:var(--green);font-weight:700;border:1px solid rgba(61,115,85,0.4);border-radius:6px;padding:1px 6px;">📲 ${t('mInstapay')}</span>`:'';
        return `<div class="rcpt-row" data-id="${s.id}" style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:11px 0;border-bottom:1px solid var(--ivory-dark);cursor:pointer;">
        <div style="min-width:0;">
          <div style="font-weight:700;font-size:14px;">#${s.receiptNo||'—'} <span style="font-weight:400;font-size:11px;color:rgba(26,26,26,0.5);">· ${(s.count||(s.items?s.items.length:0))} ${t('items_n')}</span> ${badge} ${payBadge}</div>
          <div class="num" style="font-size:11px;color:rgba(26,26,26,0.55);">${fmtDT(s.createdAt,s.tzo)} · ${s.userName||''}</div>
        </div>
        <div style="text-align:end;white-space:nowrap;"><div class="num" style="font-weight:700;font-size:15px;color:${s.voided?'rgba(26,26,26,0.4)':'var(--forest)'};${s.voided?'text-decoration:line-through;':''}">${fmt(s.total||0)} ${t('currency')}</div>${s.refundTotal>0&&!s.voided?`<div class="num" style="font-size:11px;color:var(--red);">${t('netTotal')}: ${fmt(net)}</div>`:''}</div>
      </div>`;}).join('')+`</div>`;
      box.innerHTML=html;
      box.querySelectorAll('.rcpt-row').forEach(r=>r.onclick=()=>{ const s=receiptsCache.find(x=>x.id===r.dataset.id); if(s) showReceipt(s); });
    }

      let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;"><input class="input" id="p-search" placeholder="${t('search')}" value="${prodSearch}" style="flex:1;"><button class="btn-secondary" id="scan-prod" style="padding:8px 12px;white-space:nowrap;">📷</button><button class="btn-gold" id="add-prod" style="padding:8px 14px;white-space:nowrap;">+ ${t('addProduct')}</button></div>`;
      let list=products.filter(p=>!prodSearch||(p.name||'').toLowerCase().includes(prodSearch.toLowerCase())||(p.nameAr||'').includes(prodSearch)||(p.barcode||'').includes(prodSearch));
      if(list.length===0) html+=`<div class="card"><div class="empty">${t('noProducts')}</div></div>`;
      else html+=list.map(p=>{
        const inv=inventory[p.id]||{qty:0,threshold:20}; const low=inv.qty<=5;
        const m=p.price-p.cost,mPct=p.price>0?Math.round(m/p.price*100):0;
        const sec=pName2(p);
        return `<div class="prod-card" data-id="${p.id}" style="opacity:${p.active===false?0.5:1}">
          ${p.photoUrl?`<img class="prod-photo" src="${p.photoUrl}">`:`<div class="prod-photo">🍽️</div>`}
          <div class="prod-info">
            <div style="font-size:16px;font-weight:600;">${pName(p)}</div>
            ${sec?`<div class="fr" dir="ltr" style="font-size:12px;color:rgba(26,26,26,0.5);margin-top:1px;">${sec}</div>`:''}
            <div style="font-size:11px;color:rgba(26,26,26,0.55);margin-top:1px;">${catName(p.categoryId)}</div>
            <div class="prod-meta">
              <span class="num" style="color:var(--forest);font-weight:700;">${p.price} ${t('currency')}</span>
              <span class="num" style="color:${mPct<30?'var(--red)':'var(--green)'};">${mPct}%</span>
              <span class="num" style="color:${low?'var(--red)':'rgba(26,26,26,0.55)'};">${t('stock')}: ${inv.qty}</span>
            </div>
          </div>
          <span style="color:rgba(26,26,26,0.4);">✎</span>
        </div>`;
      }).join('');
      $('content').innerHTML=html;
      $('add-prod')&&($('add-prod').onclick=()=>prodForm(null));
      $('scan-prod')&&($('scan-prod').onclick=()=>smartScan('edit_product'));
      const ps=$('p-search'); if(ps){ps.oninput=()=>{prodSearch=ps.value;const pos=ps.selectionStart;renderProducts();const n=$('p-search');n.focus();n.setSelectionRange(pos,pos);};}
      document.querySelectorAll('.prod-card').forEach(r=>r.onclick=()=>prodForm(products.find(p=>p.id===r.dataset.id)));
    }

    let pendingPhoto=null;
    function prodForm(prod, presetBarcode){
      pendingPhoto=null;
      const f=prod||{barcode:presetBarcode||'',name:'',nameAr:'',descAr:'',descEn:'',categoryId:'',price:'',cost:'',active:true,photoUrl:''};
      const inv=prod?(inventory[prod.id]||{qty:0,threshold:20}):{qty:0,threshold:20};
      let act=f.active!==false;
      const opts=categories.filter(c=>c.active!==false).map(c=>`<option value="${c.id}" ${f.categoryId===c.id?'selected':''}>${lang==='ar'?c.nameAr:c.nameEn}</option>`).join('');
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${prod?t('edit'):t('create')}</div><div class="sheet-title">${prod?t('editProduct'):t('addProduct')}</div></div><button class="close-x" id="cx">×</button></div>
        <label class="lbl">${t('photo')}</label>
        <div class="photo-upload" id="photo-box">${f.photoUrl?`<img src="${f.photoUrl}" id="photo-prev">`:`<span style="font-size:30px;">📷</span><span style="font-size:12px;">${t('addPhoto')}</span>`}</div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn-secondary" id="photo-cam" style="flex:1;">📷 ${t('takePhoto')}</button>
          <button class="btn-secondary" id="photo-gal" style="flex:1;">🖼️ ${t('fromGallery')}</button>
        </div>
        <input type="file" id="photo-input" accept="image/*" class="hidden">
        <input type="file" id="photo-cam-input" accept="image/*" capture="environment" class="hidden">
        <div class="field" style="margin-top:12px;"><label class="lbl">${t('barcode')}</label><input class="input num" id="p-bc" value="${f.barcode}" dir="ltr"></div>
        <div class="field"><label class="lbl">${t('name')}</label><input class="input fr" id="p-name" value="${f.name||''}" dir="ltr"></div>
        <div class="field"><label class="lbl">${t('nameAr')}</label><input class="input" id="p-name-ar" value="${(f.nameAr||'').replace(/"/g,'&quot;')}" dir="rtl"></div>
        <div class="field"><label class="lbl">${t('category')}</label><select class="input" id="p-cat"><option value="">${t('selectCat')}</option>${opts}</select></div>
        <div class="field"><label class="lbl">${t('descAr')}</label><textarea class="input" id="p-dar" dir="rtl" style="min-height:50px;resize:vertical;">${f.descAr||''}</textarea></div>
        <div class="field"><label class="lbl">${t('descEn')}</label><textarea class="input" id="p-den" dir="ltr" style="min-height:50px;resize:vertical;">${f.descEn||''}</textarea></div>
        <div class="row2"><div class="field"><label class="lbl">${t('price')} (${t('currency')})</label><input class="input num" id="p-price" type="number" value="${f.price}" dir="ltr"></div><div class="field"><label class="lbl">${t('cost')} (${t('currency')})</label><input class="input num" id="p-cost" type="number" value="${f.cost}" dir="ltr"></div></div>
        <div id="p-margin"></div>
        <div style="background:rgba(31,58,46,0.04);border-radius:10px;padding:12px;margin-bottom:12px;">
          <div style="font-size:10px;letter-spacing:0.5px;color:var(--forest);font-weight:700;margin-bottom:8px;">${t('branchStock')}</div>
          <div class="row2"><div><label class="lbl">${t('stock')}</label><input class="input num" id="p-stock" type="number" value="${inv.qty}" dir="ltr"></div><div><label class="lbl">${t('threshold')}</label><input class="input num" id="p-thr" type="number" value="${inv.threshold}" dir="ltr"></div></div>
        </div>
        <div style="background:white;border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--ivory-dark);margin-bottom:12px;"><span style="font-size:13px;font-weight:600;">${t('active')}</span><button class="toggle" id="p-act" style="background:${act?'var(--forest)':'rgba(26,26,26,0.2)'}"><span class="thumb"></span></button></div>
        ${prod?`<button class="btn-secondary btn-wide" id="p-del" style="margin-bottom:10px;color:var(--red);border-color:rgba(192,72,72,0.3);">${t('delete')}</button>`:''}
        <button class="btn-forest btn-wide" id="p-save">✓ ${t('save')}</button>
      </div></div>`;
      setToggle('p-act',act,v=>act=v);
      $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
      $('photo-box').onclick=()=>$('photo-input').click();
      $('photo-gal').onclick=()=>$('photo-input').click();
      $('photo-cam').onclick=()=>$('photo-cam-input').click();
      const handlePhoto=async e=>{ const file=e.target.files[0]; if(!file)return; const b64=await compress(file); if(b64.length>900000){ toast(lang==='ar'?'الصورة كبيرة جداً':'Image too large',true); return; } pendingPhoto=b64; $('photo-box').innerHTML=`<img src="${b64}">`; };
      $('photo-input').onchange=handlePhoto;
      $('photo-cam-input').onchange=handlePhoto;
      function mUpd(){const pr=parseFloat($('p-price').value),co=parseFloat($('p-cost').value);if(isNaN(pr)||isNaN(co)||pr<=0){$('p-margin').innerHTML='';return;}const m=pr-co,pct=Math.round(m/pr*100),bad=pct<30;$('p-margin').innerHTML=`<div style="background:${bad?'rgba(192,72,72,0.07)':'rgba(201,168,76,0.1)'};border-radius:10px;padding:8px 12px;margin-bottom:12px;display:flex;justify-content:space-between;"><span style="font-size:11px;color:${bad?'var(--red)':'var(--forest)'};font-weight:600;">${t('margin')}</span><span class="num" style="font-weight:700;color:${bad?'var(--red)':'var(--forest)'}">${m} ${t('currency')} · ${pct}%</span></div>`;}
      $('p-price').oninput=mUpd;$('p-cost').oninput=mUpd;mUpd();
      if(prod)$('p-del').onclick=async()=>{ if(!confirm(t('confirmDelProd')))return; try{await deleteDoc(doc(db,'products',prod.id));products=products.filter(p=>p.id!==prod.id);closeSheet();renderProducts();toast(t('deleted'));}catch(e){toast(t('errorGen'),true);} };
      $('p-save').onclick=async()=>{
        const barcode=$('p-bc').value.trim(),name=$('p-name').value.trim(),nameAr=$('p-name-ar').value.trim(),categoryId=$('p-cat').value;
        const descAr=$('p-dar').value.trim(),descEn=$('p-den').value.trim();
        const price=parseFloat($('p-price').value),cost=parseFloat($('p-cost').value);
        const qty=parseInt($('p-stock').value)||0,threshold=parseInt($('p-thr').value)||20;
        if(!barcode||(!name&&!nameAr)||!categoryId||isNaN(price)||price<=0||isNaN(cost)){toast(t('required'),true);return;}
        if(products.find(p=>p.barcode===barcode&&(!prod||p.id!==prod.id))){toast(lang==='ar'?'باركود مستخدم':'Barcode in use',true);return;}
        $('p-save').textContent=t('uploading');
        try{
          let prodId=prod?prod.id:null;
          const data={barcode,name,nameAr,categoryId,descAr,descEn,price,cost,active:act};
          if(prod){ await updateDoc(doc(db,'products',prodId),data); }
          else{ data.createdAt=Date.now(); data.photoUrl=''; const r=await addDoc(collection(db,'products'),data); prodId=r.id; }
          // photo upload
          if(pendingPhoto){ data.photoUrl=pendingPhoto; await updateDoc(doc(db,'products',prodId),{photoUrl:pendingPhoto}); }
          else if(prod) data.photoUrl=prod.photoUrl||'';
          // inventory upsert for current branch
          await setDoc(doc(db,'inventory',`${currentBranchId}_${prodId}`),{branchId:currentBranchId,productId:prodId,qty,threshold,lastCost:cost},{merge:true});
          inventory[prodId]={qty,threshold,lastCost:cost};
          // local state
          if(prod) Object.assign(prod,data,{id:prodId});
          else products.push({id:prodId,...data});
          closeSheet();renderProducts();toast(t('saved'));
        }catch(e){console.error(e);toast(t('errorGen'),true);$('p-save').textContent='✓ '+t('save');}
      };
    }

    // ============ USERS (gestione utenti) ============
    async function loadUsers(){
      users=[];
      try{
        const us=await getDocs(collection(db,'users'));
        us.forEach(d=>users.push({uid:d.id,...d.data()}));
        // manager vede solo i cashier dei propri branch + se stesso
        if(profile.role==='manager'){
          const myB=profile.branchIds||[];
          users=users.filter(u=> u.uid===user.uid || (u.role==='cashier' && (u.branchIds||[]).some(b=>myB.includes(b))) );
        }
        users.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
      }catch(e){console.error(e);}
    }
