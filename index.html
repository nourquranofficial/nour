      await loadUsers();
      const roleColor={admin:'var(--gold)',manager:'var(--green)',cashier:'var(--forest)'};
      let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div style="font-size:11px;letter-spacing:1px;color:var(--forest);font-weight:700;">${t('users').toUpperCase()}</div><button class="btn-gold" id="add-user" style="padding:8px 14px;">+ ${t('addUser')}</button></div>`;
      if(users.length===0) html+=`<div class="card"><div class="empty">${t('noUsers')}</div></div>`;
      else html+=users.map(u=>{
        const isSelf=u.uid===user.uid; const inactive=u.active===false;
        const bnames=(u.branchIds||[]).map(id=>{const b=branches.find(x=>x.id===id);return b?(lang==='ar'?b.nameAr:b.nameEn):id;}).join('، ');
        return `<div class="cat-row" data-uid="${u.uid}" style="opacity:${inactive?0.5:1}">
          <div style="width:40px;height:40px;border-radius:50%;background:rgba(31,58,46,0.08);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">👤</div>
          <div class="cat-names" style="flex:1;">
            <div style="font-weight:600;font-size:15px;">${u.name||'—'} ${isSelf?`<span style="font-size:11px;color:var(--gold);">${t('you')}</span>`:''}</div>
            <div class="num" style="font-size:12px;color:rgba(26,26,26,0.6);" dir="ltr">${u.email||''}</div>
            <div style="font-size:11px;margin-top:2px;"><span style="color:${roleColor[u.role]||'#888'};font-weight:700;">${t(u.role)||u.role}</span>${bnames?` · <span style="color:rgba(26,26,26,0.5);">${bnames}</span>`:''}${inactive?` · <span style="color:var(--red);">${t('disabled')}</span>`:''}</div>
          </div>

    function userForm(u){
      const isEdit=!!u; const isSelf=u&&u.uid===user.uid;
      // ruoli che l'utente corrente può assegnare
      let roleOpts;
      if(profile.role==='admin') roleOpts=['admin','manager','cashier'];
      else roleOpts=['cashier']; // manager crea solo cashier
      const f=u||{name:'',email:'',role:roleOpts[0],branchIds:[],active:true};
      let act=f.active!==false;
      let selRole=f.role||roleOpts[0];
      let selBranches=[...(f.branchIds||[])];
      // i branch selezionabili: admin tutti, manager solo i suoi
      const availBranches = profile.role==='admin'?branches:branches.filter(b=>(profile.branchIds||[]).includes(b.id));
      const roleSelHtml=roleOpts.map(r=>`<option value="${r}" ${selRole===r?'selected':''}>${t(r)}</option>`).join('');
      const branchChecks=availBranches.map(b=>`<label style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;"><input type="checkbox" class="b-chk" value="${b.id}" ${selBranches.includes(b.id)?'checked':''} style="width:18px;height:18px;accent-color:var(--forest);"><span style="font-size:14px;">${lang==='ar'?b.nameAr:b.nameEn}</span></label>`).join('');
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${isEdit?t('edit'):t('create')}</div><div class="sheet-title">${isEdit?t('editUser'):t('addUser')}</div></div><button class="close-x" id="cx">×</button></div>
        <div class="field"><label class="lbl">${t('name')}</label><input class="input" id="u-name" value="${f.name||''}"></div>
        <div class="field"><label class="lbl">${t('userEmail')}</label><input class="input num" id="u-email" type="email" value="${f.email||''}" dir="ltr" ${isEdit?'disabled style="opacity:0.6;"':''}>${isEdit?`<div style="font-size:11px;color:rgba(26,26,26,0.5);margin-top:4px;">${t('cannotEditEmail')}</div>`:''}</div>
        ${isEdit?'':`<div class="field"><label class="lbl">${t('userPass')}</label><input class="input num" id="u-pass" type="text" dir="ltr" placeholder="${t('passHint')}"></div>`}
        <div class="field"><label class="lbl">${t('role')}</label><select class="input" id="u-role">${roleSelHtml}</select></div>
        <div class="field"><label class="lbl">${t('branchesField')}</label><div style="background:white;border:1px solid var(--ivory-dark);border-radius:10px;padding:8px 12px;">${branchChecks||`<div style="font-size:12px;color:rgba(26,26,26,0.5);padding:6px 0;">—</div>`}</div></div>
        <div style="background:white;border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--ivory-dark);margin-bottom:12px;"><span style="font-size:13px;font-weight:600;">${t('active')}</span><button class="toggle" id="u-act" style="background:${act?'var(--forest)':'rgba(26,26,26,0.2)'}" ${isSelf?'disabled':''}><span class="thumb"></span></button></div>
        ${isSelf?`<div style="font-size:11px;color:var(--red);margin-bottom:10px;text-align:center;">${t('noEditSelf')}</div>`:''}
        <button class="btn-forest btn-wide" id="u-save">✓ ${t('save')}</button>
        ${(isEdit && profile.role==='admin' && u.email)?`<button class="btn-secondary btn-wide" id="u-reset" style="margin-top:8px;">📧 ${t('sendResetEmail')}</button><div style="font-size:11px;color:rgba(26,26,26,0.55);margin-top:4px;text-align:center;">${t('resetSentHint')}</div>`:''}
        ${(isEdit && !isSelf && profile.role==='admin')?`<button class="btn-secondary btn-wide" id="u-del" style="margin-top:8px;color:var(--red);border-color:rgba(192,72,72,0.3);">🗑️ ${t('deleteUser')}</button>`:''}
      </div></div>`;
      if(isEdit && profile.role==='admin' && u.email){
        $('u-reset').onclick=()=>sendResetEmailTo(u.email, $('u-reset'));
      }
      if(isEdit && !isSelf && profile.role==='admin'){
        $('u-del').onclick=async()=>{
          if(!confirm(t('confirmDelUser'))) return;
          const db2=$('u-del'); db2.disabled=true; db2.textContent='...';
          try{ await deleteDoc(doc(db,'users',u.uid)); closeSheet(); renderUsers(); toast(t('userDeleted')); }
          catch(e){ console.error(e); toast(t('errorGen'),true); db2.disabled=false; db2.textContent='🗑️ '+t('deleteUser'); }
        };
      }
      if(!isSelf) setToggle('u-act',act,v=>act=v);
      $('u-role').onchange=()=>{selRole=$('u-role').value;};
      $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
      $('u-save').onclick=async()=>{
        const name=$('u-name').value.trim();
        const email=isEdit?f.email:($('u-email').value.trim());
        const role=$('u-role').value;
        const chosen=Array.from(document.querySelectorAll('.b-chk:checked')).map(c=>c.value);
        if(!name){toast(t('required'),true);return;}
        if(!isEdit && !email){toast(t('required'),true);return;}
        if(chosen.length===0){toast(t('selectBranch'),true);return;}
        $('u-save').textContent='...';
        try{
          if(isEdit){
            // aggiorna solo il documento Firestore (email e password non si cambiano qui)
            await updateDoc(doc(db,'users',u.uid),{name,role,branchIds:chosen,active:isSelf?true:act});
            closeSheet(); renderUsers(); toast(t('saved'));
          } else {
            const pass=$('u-pass').value;
            if(!pass||pass.length<6){toast(t('weakPass'),true);$('u-save').textContent='✓ '+t('save');return;}
            // crea l'utente nell'istanza secondaria per NON sloggare l'admin
            let cred;
            try{ cred=await createUserWithEmailAndPassword(auth2,email,pass); }
            catch(err){
              const code=err.code||'';
              if(code.includes('email-already-in-use')) toast(t('emailInUse'),true);
              else if(code.includes('invalid-email')) toast(t('invalidEmail'),true);
              else if(code.includes('weak-password')) toast(t('weakPass'),true);
              else toast(t('errorGen'),true);
              $('u-save').textContent='✓ '+t('save'); return;
            }
            const newUid=cred.user.uid;
            await setDoc(doc(db,'users',newUid),{name,email,role,branchIds:chosen,active:true,createdAt:Date.now()});
            await signOut(auth2); // chiude la sessione secondaria
            closeSheet(); renderUsers(); toast(t('userCreated'));
          }
        }catch(e){console.error(e);toast(t('errorGen'),true);$('u-save').textContent='✓ '+t('save');}
      };
    }

    // ============ REPORTS (تقارير) ============
    function dayStart( d){ const x=new Date(d); x.setHours(0,0,0,0); return x.getTime(); }
    // ===== مين شغّال فين (نقطة 3): الورديات المفتوحة حسب الفرع / الكاشير =====
    let staffView='branch', staffSearch='';
    let reportSales=[], tpFilter={period:'7',branchId:'',min:'',max:''};
    async function renderStaff(){
      $('content').innerHTML=`<div class="spinner"></div>`;
      const visibleBranchIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
      let open=[];
      try{
        if(profile.role==='admin'){
          const qs=await getDocs(query(collection(db,'shifts'),where('status','==','open')));
          qs.forEach(d=>open.push({id:d.id,...d.data()}));
        } else {
          for(const bid of visibleBranchIds){
            const qs=await getDocs(query(collection(db,'shifts'),where('branchId','==',bid),where('status','==','open')));
            qs.forEach(d=>open.push({id:d.id,...d.data()}));
          }
        }
      }catch(e){ console.error(e); $('content').innerHTML=`<div class="card"><div class="empty">${t('errorGen')}</div></div>`; return; }
      const bn=id=>{ const b=branches.find(x=>x.id===id); return b?(lang==='ar'?b.nameAr:b.nameEn):id; };

      let html=`<div style="font-size:11px;letter-spacing:1px;color:var(--forest);font-weight:700;margin-bottom:12px;">${t('whoWhere').toUpperCase()}</div>`;
      // مبدّل العرض
      html+=`<div style="display:flex;gap:8px;margin-bottom:14px;">
        <button class="seg ${staffView==='branch'?'on':''}" data-v="branch" style="flex:1;padding:9px;border-radius:9px;border:1px solid var(--ivory-dark);background:${staffView==='branch'?'var(--forest)':'#fff'};color:${staffView==='branch'?'#fff':'var(--forest)'};font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;">🏢 ${t('byBranchView')}</button>
        <button class="seg ${staffView==='cashier'?'on':''}" data-v="cashier" style="flex:1;padding:9px;border-radius:9px;border:1px solid var(--ivory-dark);background:${staffView==='cashier'?'var(--forest)':'#fff'};color:${staffView==='cashier'?'#fff':'var(--forest)'};font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;">🧑 ${t('byCashierView')}</button>
      </div>`;

      if(open.length===0){
        html+=`<div class="card"><div class="empty">${t('noOneWorking')}</div></div>`;
        $('content').innerHTML=html;
        bindSeg(); return;
      }

      if(staffView==='branch'){
        // مجمّع حسب الفرع
        const byBranch={};
        open.forEach(s=>{ (byBranch[s.branchId]=byBranch[s.branchId]||[]).push(s); });
        const ids=Object.keys(byBranch).filter(id=>visibleBranchIds.includes(id));

    function staffRow(s, showBranch){

    // ricalcola top prodotti secondo i filtri (periodo/filiale/prezzo)
    function renderTopProducts(){
      const box=$('tp-box'); if(!box) return;
      const now=Date.now(); const tStart=dayStart(now);
      const md=new Date(now); const mStart=new Date(md.getFullYear(),md.getMonth(),1).getTime();
      let from=0;
      if(tpFilter.period==='today') from=tStart;
      else if(tpFilter.period==='month') from=mStart;
      else if(tpFilter.period==='7') from=tStart-6*86400000;
      else from=0; // all
      const minP=tpFilter.min!==''?parseFloat(tpFilter.min):null;
      const maxP=tpFilter.max!==''?parseFloat(tpFilter.max):null;
      const rmFn=s=>{ const m={}; if(s.voided)(s.items||[]).forEach(it=>m[it.productId]=(m[it.productId]||0)+it.qty); (s.returns||[]).forEach(r=>(r.lines||[]).forEach(l=>m[l.productId]=(m[l.productId]||0)+l.qty)); return m; };
      const sel=reportSales.filter(s=>s.createdAt>=from && (!tpFilter.branchId || s.branchId===tpFilter.branchId));
      const map={};
      sel.forEach(s=>{ const rm=rmFn(s); (s.items||[]).forEach(it=>{
        const price=it.price||0;
        if(minP!=null && price<minP) return;
        if(maxP!=null && price>maxP) return;
        const net=Math.max(0,it.qty-(rm[it.productId]||0)); if(net<=0)return;
        if(!map[it.productId])map[it.productId]={name:it.name,qty:0,rev:0};
        map[it.productId].qty+=net; map[it.productId].rev+=net*price;
      }); });
      const list=Object.values(map).sort((a,b)=>b.qty-a.qty).slice(0,10);
      const mx=list.length?list[0].qty:1;
      if(list.length===0){ box.innerHTML=`<div class="empty">${t('noSales')}</div>`; return; }
      box.innerHTML=list.map((p,i)=>`<div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;"><span><span class="num" style="color:rgba(26,26,26,0.4);">${i+1}.</span> <span class="fr" dir="ltr">${p.name}</span></span><span class="num" style="color:rgba(26,26,26,0.6);">${p.qty} ${t('unitsSold')} · ${fmt(p.rev)} ${t('currency')}</span></div>
        <div style="background:var(--ivory-dark);border-radius:6px;height:7px;overflow:hidden;"><div style="background:var(--forest);height:100%;width:${Math.round(p.qty/mx*100)}%;"></div></div>
      </div>`).join('');
    }
    // عرض منتج واحد في كل المخازن (نقطة 6): الكمية/التكلفة/السعر/القيمة لكل فرع + فين بيتباع أكتر
    let ppSel='';
    async function renderProductDepots(){
      const box=$('pp-box'); if(!box) return;
      if(!ppSel){ box.innerHTML=`<div class="empty">${t('pickProdView')}</div>`; return; }
      const p=products.find(x=>x.id===ppSel); if(!p){ box.innerHTML=''; return; }
      box.innerHTML=`<div class="spinner"></div>`;
      const visIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
      // كمية المنتج في كل فرع
      let rows=[]; let totQty=0, totVal=0;
      try{
        const qs=await getDocs(query(collection(db,'inventory'),where('productId','==',ppSel)));
        const byB={}; qs.forEach(d=>{ const x=d.data(); byB[x.branchId]=x; });
        for(const bid of visIds){
          const b=branches.find(x=>x.id===bid); if(!b) continue;
          const inv=byB[bid]||{qty:0,lastCost:0};
          const q=inv.qty||0, cost=inv.lastCost||0, val=q*(p.price||0);
          totQty+=q; totVal+=val;
          rows.push({name:lang==='ar'?b.nameAr:b.nameEn, qty:q, cost, val});
        }
      }catch(e){ console.error(e); box.innerHTML=`<div class="empty">${t('errorGen')}</div>`; return; }
      // فين بيتباع أكتر (من مبيعات التقرير، صافي)
      const soldByBranch={};
      reportSales.forEach(s=>{ const rm=(()=>{ const m={}; if(s.voided)(s.items||[]).forEach(it=>m[it.productId]=(m[it.productId]||0)+it.qty); (s.returns||[]).forEach(r=>(r.lines||[]).forEach(l=>m[l.productId]=(m[l.productId]||0)+l.qty)); return m; })();
        (s.items||[]).forEach(it=>{ if(it.productId!==ppSel) return; const net=Math.max(0,it.qty-(rm[it.productId]||0)); if(net<=0)return; soldByBranch[s.branchId]=(soldByBranch[s.branchId]||0)+net; }); });
      let topBranch=null, topSold=0; Object.keys(soldByBranch).forEach(bid=>{ if(soldByBranch[bid]>topSold){ topSold=soldByBranch[bid]; topBranch=bid; } });
      const topName = topBranch ? (()=>{const b=branches.find(x=>x.id===topBranch);return b?(lang==='ar'?b.nameAr:b.nameEn):'';})() : null;
      const maxQ=Math.max(1,...rows.map(r=>r.qty));
      let html=`<div style="font-size:12px;color:rgba(26,26,26,0.6);margin-bottom:10px;">${t('cost')}: <span class="num">${fmt(p.cost||0)}</span> · ${t('price')}: <span class="num">${fmt(p.price||0)}</span> ${t('currency')}</div>`;
      if(totQty===0 && rows.every(r=>r.qty===0)) html+=`<div class="empty">${t('noStockAnywhere')}</div>`;
      else html+=rows.map(r=>`<div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;"><span>${r.name}</span><span class="num" style="font-weight:700;color:var(--forest);">${r.qty}</span></div>
        <div style="background:var(--ivory-dark);border-radius:6px;height:7px;overflow:hidden;margin-bottom:2px;"><div style="background:var(--forest);height:100%;width:${Math.round(r.qty/maxQ*100)}%;"></div></div>
        <div style="font-size:10px;color:rgba(26,26,26,0.5);">${t('stockVal')}: <span class="num">${fmt(r.val)}</span> ${t('currency')}</div>
      </div>`).join('');
      html+=`<div style="border-top:1px solid var(--ivory-dark);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-size:13px;font-weight:700;"><span>${t('totalAllBranches')}</span><span class="num" style="color:var(--forest);">${totQty} · ${fmt(totVal)} ${t('currency')}</span></div>`;
      if(topName) html+=`<div style="margin-top:8px;background:rgba(201,168,76,0.12);border-radius:9px;padding:8px 11px;font-size:12px;">🏆 ${t('soldMostIn')}: <b>${topName}</b> (<span class="num">${topSold}</span>)</div>`;
      box.innerHTML=html;
    }
    // ============ DASHBOARD / لوحة التحكم (admin + manager) ============
    let dashRange={mode:'today',from:'',to:''};
    function dashRangeTs(){
      const now=Date.now();
      if(dashRange.mode==='today') return [dayStart(now), now];
      if(dashRange.mode==='7') return [now-7*86400000, now];
      if(dashRange.mode==='30') return [now-30*86400000, now];
      const f=dashRange.from?new Date(dashRange.from+'T00:00:00').getTime():dayStart(now);
      const tt=dashRange.to?new Date(dashRange.to+'T23:59:59').getTime():now;
      return [f,tt];
    }
    async function renderDashboard(){
      $('content').innerHTML=`<div class="spinner"></div>`;
      const [fromTs,toTs]=dashRangeTs();
      const visIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
      // حمّل البيانات
      let sales=[], loadsArr=[], invAll=[], shiftsArr=[];
      try{
        if(profile.role==='admin'){ (await getDocs(collection(db,'sales'))).forEach(d=>sales.push(d.data())); }
        else { for(const b of visIds){ (await getDocs(query(collection(db,'sales'),where('branchId','==',b)))).forEach(d=>sales.push(d.data())); } }
        (await getDocs(collection(db,'loads'))).forEach(d=>loadsArr.push(d.data()));
        (await getDocs(collection(db,'inventory'))).forEach(d=>invAll.push(d.data()));
        (await getDocs(collection(db,'shifts'))).forEach(d=>shiftsArr.push(d.data()));
      }catch(e){ console.error(e); $('content').innerHTML=`<div class="empty">${t('errorGen')}</div>`; return; }
      const vis=id=>profile.role==='admin'||visIds.includes(id);
      const inRange=ts=>ts>=fromTs&&ts<=toTs;
      sales=sales.filter(s=>vis(s.branchId)&&inRange(s.createdAt));
      loadsArr=loadsArr.filter(l=>vis(l.branchId)&&inRange(l.createdAt));
      invAll=invAll.filter(i=>vis(i.branchId));
      // حسابات
      const rmFn=s=>{ const m={}; if(s.voided)(s.items||[]).forEach(it=>m[it.productId]=(m[it.productId]||0)+it.qty); (s.returns||[]).forEach(r=>(r.lines||[]).forEach(l=>m[l.productId]=(m[l.productId]||0)+l.qty)); return m; };
      const eff=s=>s.voided?0:Math.max(0,(s.total||0)-(s.refundTotal||0));
      let revenue=0, cogs=0, itemsSold=0, orders=0, returnAmt=0, returnEntries=0;
      const prodRev={};
      sales.forEach(s=>{
        revenue+=eff(s); if(!s.voided)orders++;
        if(s.voided){ returnAmt+=(s.total||0); returnEntries++; } else if(s.refundTotal>0){ returnAmt+=s.refundTotal; returnEntries++; }
        const rm=rmFn(s);
        (s.items||[]).forEach(it=>{ const net=Math.max(0,it.qty-(rm[it.productId]||0)); if(net<=0)return; itemsSold+=net; const p=products.find(x=>x.id===it.productId); cogs+=net*(p?(p.cost||0):0); prodRev[it.productId]=(prodRev[it.productId]||0)+net*(it.price||0); });
      });
      const grossProfit=revenue-cogs;
      const expenses=0, totalDue=0; // لسه (هنفعّلهم مع المصاريف/المرتبات)
      const profit=grossProfit-expenses;
      let purchaseValue=0, itemsPurchased=0;
      loadsArr.forEach(l=>{ purchaseValue+=(l.total||0); itemsPurchased+=(l.qty||0); });
      // الفروع المفتوحة + الموظفين في الخدمة
      const openShifts=shiftsArr.filter(s=>s.status==='open'&&vis(s.branchId));
      const openSites=new Set(openShifts.map(s=>s.branchId)).size;
      const activeStaff=openShifts.length;
      // أعلى المنتجات
      const topProds=Object.entries(prodRev).map(([pid,rev])=>{ const p=products.find(x=>x.id===pid); return {name:p?p.name:'—', rev}; }).sort((a,b)=>b.rev-a.rev).slice(0,5);
      // نقص المخزون
      const lowList=[];
      invAll.forEach(i=>{
        const th=i.threshold||0;
        if(th<=0) return; // مفيش حد محدد → ما تظهرش
        if((i.qty||0)>th) return; // فوق الحد → كويس
        const p=products.find(x=>x.id===i.productId);
        if(!p) return; // المنتج اتمسح من الكتالوج → تجاهل (سجل خرافي)
        if(p.active===false) return; // المنتج موقوف → ما تظهرش
        lowList.push({pid:p.id, name:pName(p), barcode:p.barcode||'', qty:i.qty||0, th});
      });
      lowList.sort((a,b)=>a.qty-b.qty);
      // ===== UI =====
      const fmtDate=ts=>new Date(ts).toISOString().slice(0,10);
      const card=(label,val,sub,ico,col)=>`<div style="background:#fff;border:1px solid var(--ivory-dark);border-radius:14px;padding:14px;">

        <div class="num" style="font-size:21px;font-weight:800;margin:6px 0 2px;color:var(--charcoal);">${val}</div>
        <div style="font-size:11px;color:rgba(26,26,26,0.5);">${sub}</div></div>`;
      const cur=t('currency');
      const rangeBtn=(m,lbl)=>`<button class="dash-r" data-m="${m}" style="flex:1;padding:10px 0;border-radius:10px;font-weight:700;font-family:inherit;font-size:13px;cursor:pointer;border:1px solid ${dashRange.mode===m?'var(--forest)':'var(--ivory-dark)'};background:${dashRange.mode===m?'var(--forest)':'#fff'};color:${dashRange.mode===m?'#fff':'var(--charcoal)'};">${lbl}</button>`;
      let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <div><div style="font-size:20px;font-weight:800;">${t('dashboard_tab')}</div><div style="font-size:12px;color:rgba(26,26,26,0.5);">${t('opInsights')}</div></div>
          <button id="dash-refresh" style="background:var(--forest);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-weight:700;font-family:inherit;cursor:pointer;font-size:13px;">↻ ${t('refreshBtn')}</button>
        </div>
        <div style="margin:12px 0;">
          <button id="dash-scan" class="btn-forest btn-wide" style="padding:14px 0;font-size:15px;">📷 ${t('scanBtn')}</button>
        </div>
        <div style="background:var(--ivory-dark);border-radius:14px;padding:14px;margin-bottom:14px;">
          <div style="font-weight:700;font-size:15px;">${t('summaryWindow')}</div>
          <div style="font-size:12px;color:rgba(26,26,26,0.55);margin:2px 0 10px;">${t('showing')}: ${fmtDate(fromTs)} → ${fmtDate(toTs)}</div>
          <div style="display:flex;gap:6px;">${rangeBtn('today',t('rToday'))}${rangeBtn('7',t('r7'))}${rangeBtn('30',t('r30'))}${rangeBtn('custom',t('rCustom'))}</div>
          ${dashRange.mode==='custom'?`<div class="row2" style="margin-top:10px;"><div class="field" style="margin:0;"><label class="lbl">${t('repFrom')}</label><input class="input" id="dash-from" type="date" value="${dashRange.from||fmtDate(fromTs)}"></div><div class="field" style="margin:0;"><label class="lbl">${t('repTo')}</label><input class="input" id="dash-to" type="date" value="${dashRange.to||fmtDate(toTs)}"></div></div>`:''}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          ${card(t('mSalesRevenue'),fmt(revenue)+' '+cur,t('mNetRevRange'),'💰','rgba(61,115,85,0.15)')}
          ${card(t('mProfit'),fmt(profit)+' '+cur,t('mAfterCosts'),'٪','rgba(61,115,85,0.15)')}
          ${card(t('mExpenses'),fmt(expenses)+' '+cur,t('mExpSub'),'💲','rgba(192,72,72,0.12)')}
          ${card(t('mReturnAmount'),fmt(returnAmt)+' '+cur,returnEntries+' '+t('mReturnEntries'),'↩️','rgba(216,142,42,0.15)')}
          ${card(t('mTotalDue'),fmt(totalDue)+' '+cur,t('mDueSub'),'⚠️','rgba(192,72,72,0.12)')}
          ${card(t('mGrossProfit'),fmt(grossProfit)+' '+cur,t('mBeforeExp'),'٪','rgba(61,115,85,0.15)')}
          ${card(t('mSalesOrders'),orders,t('mCompletedTx'),'🛒','rgba(80,120,200,0.12)')}
          ${card(t('mItemsSold'),itemsSold,t('mQtySold'),'📦','rgba(140,90,200,0.12)')}
          ${card(t('mPurchaseValue'),fmt(purchaseValue)+' '+cur,t('mProcVal'),'📈','rgba(80,120,200,0.12)')}
          ${card(t('mItemsPurchased'),itemsPurchased,t('mIncomingQty'),'📊','rgba(80,150,200,0.12)')}
          ${card('🏢 '+t('mOpenSites'),openSites,t('mOpenSitesSub'),'🏢','rgba(61,115,85,0.15)')}
          ${card('👥 '+t('mActiveStaff'),activeStaff,t('mActiveStaffSub'),'👥','rgba(61,115,85,0.15)')}
        </div>`;
      // أداء المنتجات
      html+=`<div style="background:var(--ivory-dark);border-radius:14px;padding:14px;margin-top:14px;">
        <div style="font-weight:700;font-size:15px;">${t('mItemPerf')}</div>
        <div style="font-size:12px;color:rgba(26,26,26,0.55);margin-bottom:10px;">${t('mTopByRev')}</div>`;
      if(topProds.length===0) html+=`<div style="text-align:center;color:rgba(26,26,26,0.45);padding:14px 0;">${t('mNoItemData')}</div>`;
      else { const mx=Math.max(1,...topProds.map(p=>p.rev)); html+=topProds.map(p=>`<div style="margin-bottom:9px;"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;"><span style="font-weight:600;">${p.name}</span><span class="num" style="font-weight:700;color:var(--forest);">${fmt(p.rev)} ${cur}</span></div><div style="background:#fff;border-radius:6px;height:7px;overflow:hidden;"><div style="background:var(--forest);height:100%;width:${Math.round(p.rev/mx*100)}%;"></div></div></div>`).join(''); }

    async function renderReports(){
      $('content').innerHTML=`<div class="spinner"></div><div style="text-align:center;color:rgba(26,26,26,0.5);font-size:13px;">${t('loadingReports')}</div>`;
      // quali branch può vedere
      const visibleBranchIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
      let sales=[];
      try{
        // admin: tutte le vendite; manager: solo i suoi branch (query per branch)
        if(profile.role==='admin'){
          const qs=await getDocs(collection(db,'sales'));
          qs.forEach(d=>sales.push(d.data()));

      const now=Date.now(); const todayStart=dayStart(now); const weekStart=todayStart-6*86400000;

      const todaySales=sales.filter(s=>s.createdAt>=todayStart);

      const cnt=arr=>arr.filter(s=>!s.voided).length; // fatture (escluse le annullate)
      const todayRev=sum(todaySales), weekRev=sum(weekSales), monthRev=sum(monthSales);

    // ============ TURNO / الوردية (shift) ============
    // shifts/{id}: branchId,userId,userName,openAt,closeAt,openCash,closeCash,
    //   pauses:[{start,end}], status:'open'|'closed', salesTotal, expectedCash, diff,
    //   workedMs, pausedMs, createdAt   (i dati servono poi per il salario)
    function fmtDur(ms){ if(!ms||ms<0)ms=0; const tot=Math.floor(ms/60000); const h=Math.floor(tot/60), m=tot%60; return `${h}${t('hShort')} ${m}${t('mShort')}`; }
    function pausedMsOf(sh, until){ const end=until||Date.now(); return (sh.pauses||[]).reduce((a,p)=>a+((p.end||end)-p.start),0); }
    function workedMsOf(sh, until){ const end=until||sh.closeAt||Date.now(); return Math.max(0,(end-sh.openAt)-pausedMsOf(sh,end)); }
    function isOnPause(sh){ const ps=sh.pauses||[]; return ps.length>0 && !ps[ps.length-1].end; }
    function fmtTime(ts, tzo){ const off=(tzo!=null)?tzo:tzOffsetMin(ts); return fmtFromOffShort(ts,off); }

    async function loadShifts(){
      shifts=[];
      await loadMyOpenShift(); // turno aperto (in qualsiasi filiale) — definisce la filiale
      // storico: admin/manager => tutti del branch corrente; cassiere => i suoi
      let qs;
      if(profile.role==='admin'||profile.role==='manager') qs=await getDocs(query(collection(db,'shifts'),where('branchId','==',currentBranchId)));
      else qs=await getDocs(query(collection(db,'shifts'),where('branchId','==',currentBranchId),where('userId','==',user.uid)));
      qs.forEach(d=>shifts.push({id:d.id,...d.data()}));
      shifts.sort((a,b)=>(b.openAt||0)-(a.openAt||0));
      await loadCustodyTx();
    }

    async function shiftSalesTotal(sh){
      const sp=await shiftSalesSplit(sh); return sp.total;
    }
    // يفصل مبيعات الوردية: كاش / Instapay / الإجمالي
    // إحصائيات الوردية الحيّة من مصفوفة مبيعات: صافي/كاش/Instapay/فواتير/منتجات/مرتجعات
    function computeShiftStats(salesArr, sh){
      const end=sh.closeAt||Date.now();
      let net=0,cash=0,insta=0,invoices=0,products=0,stornoVal=0,stornoCnt=0;
      salesArr.forEach(s=>{
        if(s.userId!==sh.userId || s.branchId!==sh.branchId) return;
        if(!(s.createdAt>=sh.openAt && s.createdAt<=end)) return;
        const eff = s.voided?0:Math.max(0,(s.total||0)-(s.refundTotal||0));
        net+=eff; if(s.payMethod==='instapay') insta+=eff; else cash+=eff;
        if(!s.voided){ invoices++; (s.items||[]).forEach(it=>products+=(it.qty||0)); (s.returns||[]).forEach(r=>(r.lines||[]).forEach(l=>products-=(l.qty||0))); }
        if(s.voided){ stornoVal+=(s.total||0); stornoCnt++; }
        else if(s.refundTotal>0){ stornoVal+=(s.refundTotal||0); stornoCnt++; }
      });
      return {net,cash,insta,invoices,products,stornoVal,stornoCnt};
    }
    async function shiftSalesSplit(sh){
      const qs=await getDocs(query(collection(db,'sales'),where('branchId','==',sh.branchId),where('userId','==',sh.userId)));
      let cash=0, insta=0; const end=sh.closeAt||Date.now();
      qs.forEach(d=>{ const s=d.data(); if(s.createdAt>=sh.openAt && s.createdAt<=end){ const v=s.total||0; if(s.payMethod==='instapay') insta+=v; else cash+=v; } });
      return { cash, insta, total:cash+insta };
    }

    // ===== العُهدة: تسليم النقدية بين الورديات (بتأكيد المستلِم) =====
    // المبيعات تفضل مسجّلة باسم صاحبها؛ اللي بيتنقل هو حيازة الكاش بس.
    function custInSum(sh){ return custodyTx.filter(x=>x.status==='confirmed' && x.toShiftId===sh.id).reduce((a,x)=>a+(x.amount||0),0); }
    function custOutSum(sh){ return custodyTx.filter(x=>x.status==='confirmed' && x.fromShiftId===sh.id).reduce((a,x)=>a+(x.amount||0),0); }
    function custPendingOut(sh){ return custodyTx.filter(x=>x.status==='pending' && x.fromShiftId===sh.id); }
    function custNet(sh){ return custInSum(sh)-custOutSum(sh); } // صافي العهدة المؤكَّدة لهذه الوردية
    async function loadCustodyTx(){
      custodyTx=[];
      try{ const qs=await getDocs(query(collection(db,'custodyTransfers'),where('branchId','==',currentBranchId)));
        qs.forEach(d=>custodyTx.push({id:d.id,...d.data()})); }catch(e){ console.error('loadCustodyTx',e); }
    }
    // يفتح شيت تسليم العهدة من الوردية fromSh لزميل ورديته مفتوحة في نفس الفرع (يتسجّل pending)
    function openHandSheet(fromSh){
      const targets=shifts.filter(s=>s.status==='open' && s.branchId===fromSh.branchId && s.id!==fromSh.id);
      if(targets.length===0){ toast(t('noOpenColleague'),true); return; }
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('custodyTitle')}</div><div class="sheet-title">🤝 ${t('handOver')}</div></div><button class="close-x" id="cx">×</button></div>
        <div style="font-size:13px;margin-bottom:12px;">${t('custFrom')}: <b>${fromSh.userName||''}</b></div>
        <div class="field"><label class="lbl">${t('handTo')}</label><select class="input" id="hand-to">${targets.map(s=>`<option value="${s.id}">${s.userName||''}</option>`).join('')}</select></div>
        <div class="field"><label class="lbl">${t('handAmount')} (${t('currency')})</label><input class="input num" id="hand-amt" type="number" min="0" step="0.01" dir="ltr" placeholder="0"></div>
        <button class="btn-forest btn-wide" id="hand-confirm">✓ ${t('handOver')}</button>
      </div></div>`;
      $('ov').onclick=closeSheet;$('cx').onclick=closeSheet;
      $('hand-confirm').onclick=async()=>{
        const amt=parseFloat($('hand-amt').value)||0;
        const toId=$('hand-to').value;
        const toSh=targets.find(s=>s.id===toId);
        if(amt<=0||!toSh){ toast(t('errorGen'),true); return; }
        const b=$('hand-confirm'); b.disabled=true; b.textContent='...';
        try{
          const createdAt=Date.now();
          await addDoc(collection(db,'custodyTransfers'),{
            branchId:fromSh.branchId, fromShiftId:fromSh.id, fromUserId:fromSh.userId, fromUserName:fromSh.userName||'',
            toShiftId:toSh.id, toUserId:toSh.userId, toUserName:toSh.userName||'',
            amount:amt, status:'pending', createdAt, tzo:tzOffsetMin(createdAt)
          });
          closeSheet(); toast(t('custSent')); await loadCustodyTx(); renderShift();
        }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='✓ '+t('handOver'); }
      };
    }

    // فحص دوري للعُهد المستنية تأكيد المستخدم الحالي (شبه فوري)
    let _custodyChecking=false;
    async function checkPendingCustody(){
      if(!user||_custodyChecking) return; _custodyChecking=true;
      try{
        const qs=await getDocs(query(collection(db,'custodyTransfers'),where('toUserId','==',user.uid),where('status','==','pending')));
        let pend=null; qs.forEach(d=>{ if(!pend) pend={id:d.id,...d.data()}; });
        if(pend && !document.getElementById('cust-confirm-ov')) showCustodyConfirm(pend);
      }catch(e){ console.error('checkPendingCustody',e); } finally{ _custodyChecking=false; }
    }
    function showCustodyConfirm(tx){
      const root=$('sheet-root');
      root.innerHTML=`<div class="overlay" id="cust-confirm-ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('custodyTitle')}</div><div class="sheet-title">📥 ${t('custConfirmReceipt')}</div></div></div>
        <div style="text-align:center;margin:6px 0 14px;">
          <div style="font-size:13px;margin-bottom:6px;"><b>${tx.fromUserName||''}</b> ${t('custConfirmMsg')}</div>
          <div class="num" style="font-size:30px;font-weight:700;color:var(--forest);">${fmt(tx.amount)} ${t('currency')}</div>
        </div>
        <label style="display:flex;gap:10px;align-items:flex-start;background:rgba(31,58,46,0.05);border-radius:12px;padding:12px;margin-bottom:14px;cursor:pointer;">
          <input type="checkbox" id="cust-chk" style="width:20px;height:20px;margin-top:1px;flex-shrink:0;">
          <span style="font-size:13px;font-weight:600;">${t('custCheckbox')}</span>
        </label>
        <button class="btn-forest btn-wide" id="cust-confirm-btn" disabled style="opacity:0.5;">✓ ${t('custConfirmBtn')}</button>
        <button class="btn-secondary btn-wide" id="cust-reject-btn" style="margin-top:8px;color:var(--red);border-color:rgba(192,72,72,0.3);">✕ ${t('custReject')}</button>
      </div></div>`;
      const chk=$('cust-chk'), btn=$('cust-confirm-btn');
      chk.onchange=()=>{ btn.disabled=!chk.checked; btn.style.opacity=chk.checked?'1':'0.5'; };
      $('cust-reject-btn').onclick=async()=>{
        if(!confirm(t('custRejectMsg'))) return;
        const rb=$('cust-reject-btn'); rb.disabled=true; rb.textContent='...';
        try{
          await updateDoc(doc(db,'custodyTransfers',tx.id),{status:'rejected',rejectedAt:Date.now()});
          root.innerHTML=''; toast(t('custRejectedToast'));
          await loadCustodyTx(); if(activeTab==='shift') renderShift();
        }catch(e){ console.error(e); toast(t('errorGen'),true); rb.disabled=false; rb.textContent='✕ '+t('custReject'); }
      };
      btn.onclick=async()=>{
        if(!chk.checked) return;
        btn.disabled=true; btn.textContent='...';
        try{
          await updateDoc(doc(db,'custodyTransfers',tx.id),{status:'confirmed',confirmedAt:Date.now()});
          root.innerHTML=''; toast(t('custConfirmed'));
          await loadCustodyTx(); if(activeTab==='shift') renderShift();
        }catch(e){ console.error(e); toast(t('errorGen'),true); btn.disabled=false; btn.textContent='✓ '+t('custConfirmBtn'); }
      };
    }

    let shiftSalesArr=[]; // مبيعات الفرع الحالي (لإحصائيات الورديات الحيّة)
    async function loadShiftSales(){
      shiftSalesArr=[];
      try{ const qs=await getDocs(query(collection(db,'sales'),where('branchId','==',currentBranchId))); qs.forEach(d=>shiftSalesArr.push(d.data())); }catch(e){ console.error('loadShiftSales',e); }
    }
    async function renderShift(){
      const cb=$('cart-bar-root'); if(cb) cb.innerHTML='';
      $('content').innerHTML=`<div class="empty">…</div>`;
      await loadShifts();
      await loadShiftSales();
      let html=`<div style="font-size:11px;letter-spacing:1px;color:var(--forest);font-weight:700;margin-bottom:12px;">${t('shift').toUpperCase()}</div>`;

      if(!myShift){
        // nessun turno aperto -> form apertura
        html+=`<div class="card">
          <div class="card-title">🕐 ${t('openShift')}</div>
          <div style="font-size:12px;color:rgba(26,26,26,0.55);margin-bottom:12px;">${t('openCashHint')}</div>
          <div class="field"><label class="lbl">${t('shiftBranch')}</label><select class="input" id="sh-open-branch">${branches.map(b=>`<option value="${b.id}" ${b.id===currentBranchId?'selected':''}>${lang==='ar'?b.nameAr:b.nameEn}</option>`).join('')}</select><div style="font-size:11px;color:rgba(26,26,26,0.5);margin-top:4px;">${t('pickBranch')}</div></div>
          <div class="field"><label class="lbl">${t('openCash')}</label><input class="input num" id="sh-open-cash" type="number" min="0" step="0.01" dir="ltr" placeholder="0"></div>
          <button class="btn-gold btn-wide" id="sh-open-btn">🕐 ${t('openShift')}</button>
        </div>`;
      } else {
        // turno aperto -> stato + pausa + chiusura
        const onP=isOnPause(myShift);
        html+=`<div class="card">
          <div class="card-title">🟢 ${t('shiftOpen')}</div>
          <div style="background:rgba(31,58,46,0.06);border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:13px;font-weight:700;color:var(--forest);">📍 ${t('sellingIn')}: ${(()=>{const b=branches.find(x=>x.id===myShift.branchId);return b?(lang==='ar'?b.nameAr:b.nameEn):myShift.branchId;})()}</div>
          <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
            <div style="flex:1;min-width:90px;background:rgba(31,58,46,0.05);border-radius:10px;padding:10px;text-align:center;"><div style="font-size:10px;color:rgba(26,26,26,0.55);font-weight:700;">${t('openedAt')}</div><div class="num" style="font-size:14px;font-weight:700;margin-top:3px;">${fmtTime(myShift.openAt)}</div></div>
            <div style="flex:1;min-width:90px;background:rgba(31,58,46,0.05);border-radius:10px;padding:10px;text-align:center;"><div style="font-size:10px;color:rgba(26,26,26,0.55);font-weight:700;">${t('worked')}</div><div class="num" id="sh-worked" style="font-size:14px;font-weight:700;margin-top:3px;color:var(--forest);">${fmtDur(workedMsOf(myShift))}</div></div>
            <div style="flex:1;min-width:90px;background:rgba(216,142,42,0.1);border-radius:10px;padding:10px;text-align:center;"><div style="font-size:10px;color:rgba(26,26,26,0.55);font-weight:700;">${t('pausedTime')}</div><div class="num" id="sh-paused" style="font-size:14px;font-weight:700;margin-top:3px;color:var(--amber);">${fmtDur(pausedMsOf(myShift))}</div></div>
          </div>
          <div style="font-size:12px;color:rgba(26,26,26,0.55);margin-bottom:10px;">${t('openCash')}: <span class="num" style="font-weight:700;">${fmt(myShift.openCash||0)}</span> ${t('currency')}</div>
          ${onP?`<div style="background:rgba(216,142,42,0.12);border-radius:10px;padding:8px 12px;margin-bottom:12px;text-align:center;font-weight:700;color:var(--amber);">⏸️ ${t('onPause')}</div>`:''}
          <button class="${onP?'btn-gold':'btn-secondary'} btn-wide" id="sh-pause-btn" style="margin-bottom:10px;">${onP?'▶️ '+t('resume'):'⏸️ '+t('pause')}</button>
        </div>
        ${(()=>{ const st=computeShiftStats(shiftSalesArr,myShift); return `<div class="card">
          <div class="card-title">📊 ${t('shiftLiveTitle')}</div>
          <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
            <div style="flex:1;min-width:90px;background:rgba(61,115,85,0.1);border-radius:10px;padding:10px;text-align:center;"><div style="font-size:10px;color:rgba(26,26,26,0.55);font-weight:700;">${t('liveNet')}</div><div class="num" style="font-size:16px;font-weight:700;margin-top:3px;color:var(--green);">${fmt(st.net)}</div></div>
            <div style="flex:1;min-width:60px;background:rgba(31,58,46,0.05);border-radius:10px;padding:10px;text-align:center;"><div style="font-size:10px;color:rgba(26,26,26,0.55);font-weight:700;">${t('invoicesShort')}</div><div class="num" style="font-size:16px;font-weight:700;margin-top:3px;">${st.invoices}</div></div>
            <div style="flex:1;min-width:60px;background:rgba(31,58,46,0.05);border-radius:10px;padding:10px;text-align:center;"><div style="font-size:10px;color:rgba(26,26,26,0.55);font-weight:700;">${t('prodsCount')}</div><div class="num" style="font-size:16px;font-weight:700;margin-top:3px;">${st.products}</div></div>
          </div>
          <div style="display:flex;gap:12px;font-size:12px;color:rgba(26,26,26,0.65);flex-wrap:wrap;">
            <span>💵 ${t('mCash')}: <b class="num" style="color:var(--forest);">${fmt(st.cash)}</b></span>
            ${st.insta?`<span>📲 ${t('mInstapay')}: <b class="num" style="color:var(--green);">${fmt(st.insta)}</b></span>`:''}
          </div>
          ${st.stornoCnt?`<div style="margin-top:8px;background:rgba(192,72,72,0.08);border-radius:10px;padding:8px 11px;font-size:12px;color:var(--red);font-weight:700;">↩️ ${t('stornoLbl')}: <span class="num">${fmt(st.stornoVal)}</span> ${t('currency')} (<span class="num">${st.stornoCnt}</span>)</div>`:''}
        </div>`; })()}
        <div class="card">
          <div class="card-title">🔴 ${t('closeShift')}</div>
          <div style="font-size:12px;color:rgba(26,26,26,0.55);margin-bottom:12px;">${t('countedCashHint')}</div>
          <div class="field"><label class="lbl">${t('countedCash')}</label><input class="input num" id="sh-close-cash" type="number" min="0" step="0.01" dir="ltr" placeholder="0"></div>
          <button class="btn-forest btn-wide" id="sh-close-btn">🔴 ${t('closeShift')}</button>
        </div>`;
      }

      // ===== العُهد: الورديات المفتوحة في الفرع (أدمن/مدير) =====
      if(profile.role==='admin'||profile.role==='manager'){
        const openShifts=shifts.filter(s=>s.status==='open' && s.branchId===currentBranchId);
        html+=`<div class="card"><div class="card-title">🤝 ${t('custodyTitle')}</div>`;
        if(openShifts.length===0) html+=`<div class="empty">${t('noOpenShiftsBranch')}</div>`;
        else html+=openShifts.map(s=>{
          const inS=custInSum(s), outS=custOutSum(s); const pend=custPendingOut(s);
          const st=computeShiftStats(shiftSalesArr,s);
          return `<div style="padding:10px 0;border-bottom:1px solid var(--ivory-dark);">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div style="font-weight:700;font-size:13px;">🟢 ${s.userName||''}</div>
              <button class="hand-btn" data-sh="${s.id}" style="background:var(--forest);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;">🤝 ${t('handOver')}</button>
            </div>
            <div style="display:flex;gap:12px;margin-top:5px;font-size:11px;flex-wrap:wrap;color:rgba(26,26,26,0.65);">
              <span>📊 ${t('soldSoFar')}: <b class="num" style="color:var(--green);">${fmt(st.net)}</b></span>
              <span>🧾 <b class="num">${st.invoices}</b> ${t('invoicesShort')}</span>
              <span>📦 <b class="num">${st.products}</b> ${t('prodsCount')}</span>
            </div>
            ${st.stornoCnt?`<div style="font-size:11px;color:var(--red);margin-top:3px;">↩️ ${t('stornoLbl')}: <span class="num">${fmt(st.stornoVal)}</span> (<span class="num">${st.stornoCnt}</span>)</div>`:''}
            <div style="display:flex;gap:12px;margin-top:3px;font-size:11px;flex-wrap:wrap;color:rgba(26,26,26,0.6);">
              ${inS>0?`<span>📥 ${t('custReceived')}: <b class="num" style="color:var(--green);">${fmt(inS)}</b></span>`:''}
              ${outS>0?`<span>📤 ${t('custHanded')}: <b class="num" style="color:var(--amber);">${fmt(outS)}</b></span>`:''}
            </div>
            ${custodyTx.filter(x=>x.status==='confirmed'&&x.toShiftId===s.id).map(x=>`<div style="font-size:11px;color:rgba(26,26,26,0.5);margin-top:2px;">📥 ${t('custFrom')} ${x.fromUserName}: <span class="num">${fmt(x.amount)}</span> ✓</div>`).join('')}
            ${custodyTx.filter(x=>x.status==='confirmed'&&x.fromShiftId===s.id).map(x=>`<div style="font-size:11px;color:rgba(26,26,26,0.5);margin-top:2px;">📤 ${t('custTo')} ${x.toUserName}: <span class="num">${fmt(x.amount)}</span> ✓</div>`).join('')}
            ${pend.map(x=>`<div style="font-size:11px;color:var(--amber);margin-top:2px;">⏳ ${t('custTo')} ${x.toUserName}: <span class="num">${fmt(x.amount)}</span> — ${t('custPending')}</div>`).join('')}
            ${custodyTx.filter(x=>x.status==='rejected'&&x.fromShiftId===s.id).map(x=>`<div style="font-size:11px;color:var(--red);margin-top:2px;">✕ ${t('custTo')} ${x.toUserName}: <span class="num">${fmt(x.amount)}</span> — ${t('custRejected')}</div>`).join('')}
          </div>`;
        }).join('');
        html+=`</div>`;
      }

      // storico
      const closed=shifts.filter(s=>s.status==='closed');
      html+=`<div class="card"><div class="card-title">📚 ${t('shiftHistory')}</div>`;
      if(closed.length===0) html+=`<div class="empty">${t('noShiftsYet')}</div>`;
      else html+=closed.map(s=>{
        const diff=s.diff||0; const dc=diff>0?'var(--amber)':diff<0?'var(--red)':'var(--green)';
        const sg=diff>0?'+':diff<0?'−':'';
        return `<div style="padding:10px 0;border-bottom:1px solid var(--ivory-dark);">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div style="font-weight:700;font-size:13px;">${s.userName||''}</div>
            <div class="num" style="font-size:11px;color:rgba(26,26,26,0.5);">${fmtTime(s.openAt)}</div>
          </div>
          <div style="display:flex;gap:12px;margin-top:4px;font-size:11px;flex-wrap:wrap;">
            <span>${t('worked')}: <b class="num">${fmtDur(s.workedMs)}</b></span>
            <span>${t('shiftSales')}: <b class="num">${fmt(s.salesTotal||0)}</b></span>
            <span>${t('cashDiff')}: <b class="num" style="color:${dc};">${sg}${fmt(diff)}</b></span>
          </div>
          <button class="lnk-btn" data-sh="${s.id}" style="margin-top:6px;background:none;border:none;color:var(--forest);font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;padding:0;">📄 ${t('shiftReport')}</button>
        </div>`;
      }).join('');
      html+=`</div>`;
      $('content').innerHTML=html;

      // binding
      if(!myShift){
        $('sh-open-btn').onclick=async()=>{
          const oc=parseFloat($('sh-open-cash').value)||0;
          const chosenBranch=$('sh-open-branch')?$('sh-open-branch').value:currentBranchId;
          const b=$('sh-open-btn'); b.disabled=true; b.textContent='...';
          try{
            const data={branchId:chosenBranch,userId:user.uid,userName:profile.name||user.email,openAt:Date.now(),closeAt:null,openCash:oc,closeCash:null,pauses:[],status:'open',createdAt:Date.now()};
            const ref=await addDoc(collection(db,'shifts'),data);
            myShift={id:ref.id,...data};
            currentBranchId=chosenBranch;        // blocca la filiale sul turno
            applyBranchLock();
            await loadCatalog();                 // carica il magazzino della filiale del turno
            toast(t('shiftOpened')); renderShift();
          }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='🕐 '+t('openShift'); }
        };
      } else {
        $('sh-pause-btn').onclick=async()=>{
          const ps=myShift.pauses?[...myShift.pauses]:[];
          if(isOnPause(myShift)) ps[ps.length-1].end=Date.now(); else ps.push({start:Date.now(),end:null});
          try{ await updateDoc(doc(db,'shifts',myShift.id),{pauses:ps}); myShift.pauses=ps; renderShift(); }
          catch(e){ console.error(e); toast(t('errorGen'),true); }
        };
        $('sh-close-btn').onclick=async()=>{
          if(!confirm(t('confirmCloseShift'))) return;
          const cc=parseFloat($('sh-close-cash').value)||0;
          const b=$('sh-close-btn'); b.disabled=true; b.textContent='...';
          try{
            const ps=myShift.pauses?[...myShift.pauses]:[];
            if(isOnPause(myShift)) ps[ps.length-1].end=Date.now(); // chiudi pausa aperta
            const closeAt=Date.now();
            const shTmp={...myShift,pauses:ps,closeAt};
            const split=await shiftSalesSplit(shTmp);
            const salesTotal=split.total, cashTotal=split.cash, instaTotal=split.insta;
            const workedMs=workedMsOf(shTmp,closeAt);
            const pausedMs=pausedMsOf(shTmp,closeAt);
            const expectedCash=(myShift.openCash||0)+cashTotal+custNet(myShift); // الكاش بس + العهدة (Instapay مايدخلش الدرج)
            const diff=cc-expectedCash;
            const custIn=custInSum(myShift), custOut=custOutSum(myShift);
            await updateDoc(doc(db,'shifts',myShift.id),{pauses:ps,closeAt,closeCash:cc,status:'closed',salesTotal,cashTotal,instaTotal,workedMs,pausedMs,expectedCash,diff,custodyInTotal:custIn,custodyOutTotal:custOut});
            toast(t('shiftClosed'));
            const full={...shTmp,closeCash:cc,status:'closed',salesTotal,cashTotal,instaTotal,workedMs,pausedMs,expectedCash,diff,custodyInTotal:custIn,custodyOutTotal:custOut};
            myShift=null;
            applyBranchLock(); // sblocca il selettore filiale
            showShiftReport(full);
          }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='🔴 '+t('closeShift'); }
        };
      }
      document.querySelectorAll('.hand-btn[data-sh]').forEach(btn=>btn.onclick=()=>{ const s=shifts.find(x=>x.id===btn.dataset.sh); if(s) openHandSheet(s); });
      document.querySelectorAll('.lnk-btn[data-sh]').forEach(btn=>btn.onclick=()=>{ const s=shifts.find(x=>x.id===btn.dataset.sh); if(s) showShiftReport(s); });

      // timer live (aggiorna ore lavorate ogni 30s se turno aperto)
      if(myShift){ clearInterval(window.__shTimer); window.__shTimer=setInterval(()=>{ const w=$('sh-worked'),p=$('sh-paused'); if(!w){clearInterval(window.__shTimer);return;} if(myShift){ w.textContent=fmtDur(workedMsOf(myShift)); p.textContent=fmtDur(pausedMsOf(myShift)); } },30000); }
    }

    function showShiftReport(s){
      const dc=(s.diff||0)>0?'var(--amber)':(s.diff||0)<0?'var(--red)':'var(--green)';

        <div style="display:flex;gap:8px;margin-top:14px;">
          <button class="btn-forest btn-wide" id="sh-print">🖨️ ${t('print')}</button>

        <button class="btn-secondary btn-wide" id="sh-back" style="margin-top:4px;">← ${t('shift')}</button>`;
      $('content').innerHTML=html;
      const title=`${t('shiftReport')} · ${bn} · ${s.userName||''}`;
      $('sh-print').onclick=()=>{
        const body=`<table><tbody>
          <tr><td>${t('byUser')}</td><td>${s.userName||''}</td></tr>
          <tr><td>${t('openedAt')}</td><td>${fmtTime(s.openAt)}</td></tr>
          <tr><td>${t('closedAt')}</td><td>${fmtTime(s.closeAt)}</td></tr>

          <tr><td>${t('shiftSales')}</td><td>${fmt(s.salesTotal||0)} ${t('currency')}</td></tr>
          <tr><td>${t('expectedCash')}</td><td>${fmt(s.expectedCash||0)} ${t('currency')}</td></tr>

      $('sh-dl').onclick=()=>{
        const header=[t('byUser'),t('openedAt'),t('closedAt'),t('worked'),t('pausedTime'),t('openCash'),t('shiftSales'),t('expectedCash'),t('countedCash'),t('cashDiff')];

      $('sh-back').onclick=()=>renderShift();

    // ============ MAGAZZINO (المخزن: استلام + جرد) ============
    let whSubTab='receive';
    let recvCart=[]; // قائمة استلام متعددة المنتجات
    let recvSupplier=''; // المورد المختار للاستلام
    let invCounts={}; // productId -> counted (string)

    // ===== سكانر الباركود بالكاميرا (يستخدم مكتبة html5-qrcode) =====
    let _bcScanner=null;
    function stopScanner(){ if(_bcScanner){ try{ _bcScanner.stop().then(()=>{try{_bcScanner.clear();}catch(e){} _bcScanner=null;}).catch(()=>{_bcScanner=null;}); }catch(e){ _bcScanner=null; } } }
    // صوت "بيب" زي ماسح السوبر ماركت — متولّد بدون ملفات (Web Audio)
    let _audioCtx=null;
    function beep(){
      try{
        _audioCtx = _audioCtx || new (window.AudioContext||window.webkitAudioContext)();
        if(_audioCtx.state==='suspended') _audioCtx.resume();
        const o=_audioCtx.createOscillator(), g=_audioCtx.createGain();
        o.type='square'; o.frequency.value=2000; // نغمة عالية واضحة زي السوبر ماركت
        g.gain.setValueAtTime(0.0001,_audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.25,_audioCtx.currentTime+0.01);
        g.gain.exponentialRampToValueAtTime(0.0001,_audioCtx.currentTime+0.12);
        o.connect(g); g.connect(_audioCtx.destination);
        o.start(); o.stop(_audioCtx.currentTime+0.13);
      }catch(e){ /* لو المتصفح مش بيدعم الصوت، يكمّل عادي */ }
    }
    function openScanner(onResult){
      $('sheet-root').innerHTML=`<div class="overlay" id="ov"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('scanBarcode')}</div><div class="sheet-title">📷 ${t('scanHint')}</div></div><button class="close-x" id="cx">×</button></div>
        <div id="bc-reader" style="width:100%;border-radius:12px;overflow:hidden;background:#000;min-height:220px;"></div>
        <div id="bc-msg" style="font-size:12px;color:var(--red);margin-top:10px;text-align:center;"></div>
        <div class="field" style="margin-top:12px;"><label class="lbl">${t('barcode')}</label><input class="input num" id="bc-manual" dir="ltr" placeholder="..."></div>
        <button class="btn-secondary btn-wide" id="bc-manual-ok">✓ ${t('barcode')}</button>
      </div></div>`;
      const close=()=>{ stopScanner(); closeSheet(); };
      $('ov').onclick=close; $('cx').onclick=close;
      $('bc-manual-ok').onclick=()=>{ const v=$('bc-manual').value.trim(); if(v){ beep(); close(); onResult(v); } };
      if(typeof Html5Qrcode==='undefined'){ $('bc-msg').textContent=t('camNoAccess'); return; }
      const cfg={ fps:10, qrbox:{width:260,height:150}, formatsToSupport:[
        Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.CODE_93,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.CODABAR,Html5QrcodeSupportedFormats.QR_CODE ] };
      _bcScanner=new Html5Qrcode('bc-reader');
      const ok=(txt)=>{ if(!txt)return; beep(); stopScanner(); closeSheet(); onResult(String(txt).trim()); };
      _bcScanner.start({facingMode:'environment'},cfg,ok,()=>{}).catch(()=>{
        Html5Qrcode.getCameras().then(ds=>{ if(ds&&ds.length){ _bcScanner.start(ds[0].id,cfg,ok,()=>{}).catch(()=>{ $('bc-msg').textContent=t('camNoAccess'); }); } else { $('bc-msg').textContent=t('camNoAccess'); } }).catch(()=>{ $('bc-msg').textContent=t('camNoAccess'); });
      });
    }
    // مسح باركود لإنشاء منتج جديد (من الكاشير أو المنتجات): موجود => فتح للتعديل؛ جديد => فورم بالباركود
    // البحث بالباركود بطريقة آمنة (مسافات/فراغات مش هتفرق)
    function findByBarcode(code){
      const c=String(code||'').trim();
      if(!c) return null;
      return products.find(p=>String(p.barcode||'').trim()===c);
    }
    // ============ المسح الذكي: زرار واحد بسلوك مختلف حسب الصفحة ============
    function smartScan(ctx, opts){
      openScanner(code=>{
        const c=String(code||'').trim();
        const p=findByBarcode(c);
        // -- لو المنتج مش موجود --
        if(!p){
          if(ctx==='refund'){ toast(t('notInThisInvoice'),true); return; }
          if(ctx==='edit_product' && activeTab==='products'){ prodSearch=c; renderProducts(); }
          if(confirm(t('createNewWithBarcode'))) prodForm(null, c);
          return;
        }
        // -- لو موجود: سلوك حسب الصفحة --
        if(ctx==='sell'){
          if(p.active===false){ toast(t('outOfStock'),true); return; }
          addToCart(p);
          const it=cart.find(i=>i.id===p.id);
          toast(`${pName(p)} ×${it?it.qty:1}`);
        }
        else if(ctx==='edit_product'){ toast(t('prodExistsScan')); prodForm(p); }
        else if(ctx==='receive'){ askReceiveQty(p); }
        else if(ctx==='count'){ askCountQty(p); }
        else if(ctx==='transfer'){
          const sel=$('tr-prod'); if(sel){ sel.value=p.id; sel.dispatchEvent(new Event('change')); }
          toast(`${pName(p)}`);
        }
        else if(ctx==='refund'){
          const it=opts&&opts.avail&&opts.avail.find(a=>a.productId===p.id);
          if(!it){ toast(t('notInThisInvoice'),true); return; }
          const el=$('rt-'+it.productId); const cur=parseInt(el.value)||0;
          if(cur+1>it.remain){ toast(t('nothingToReturn'),true); return; }
          el.value=cur+1; if(opts.recompute) opts.recompute();
          toast(`${pName(p)} ×${cur+1}`);
        }
        else if(ctx==='dashboard'){ showProductDetail(p); }
      });
    }
    // نافذة الجرد السريع لمنتج واحد (لما تمسح في تبويب الجرد)
    function askCountQty(p){
      const inv=inventory[p.id]||{qty:0};
      $('sheet-root').innerHTML=`<div class="overlay" id="ov" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('countAddedByScan')}</div><div class="sheet-title">${pName(p)}</div></div><button class="close-x" id="cx">×</button></div>
        <div style="background:rgba(31,58,46,0.06);border-radius:9px;padding:10px;margin-bottom:12px;font-size:13px;">${t('systemQty')}: <span class="num" style="font-weight:700;">${inv.qty||0}</span></div>

    // كارت تفاصيل المنتج للـ Dashboard
    async function showProductDetail(p){
      $('sheet-root').innerHTML=`<div class="overlay" id="ov" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-head"><div><div class="sheet-sub">${t('prodDetails')}</div><div class="sheet-title">${pName(p)}</div></div><button class="close-x" id="cx">×</button></div>
        <div class="card" style="display:grid;gap:8px;font-size:13px;">

          <div style="display:flex;justify-content:space-between;"><span style="color:rgba(26,26,26,0.6);">${t('price')}</span><span class="num" style="font-weight:700;color:var(--forest);">${fmt(p.price||0)} ${t('currency')}</span></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:rgba(26,26,26,0.6);">${t('cost')}</span><span class="num">${fmt(p.cost||0)} ${t('currency')}</span></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:rgba(26,26,26,0.6);">${t('grossProfit')} / ${t('mPcs')}</span><span class="num" style="font-weight:700;color:var(--green);">${fmt((p.price||0)-(p.cost||0))} ${t('currency')}</span></div>
        </div>
        <div class="card"><div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;margin-bottom:8px;">📦 ${t('stockByBranch')}</div><div id="pd-stock"><div class="spinner"></div></div></div>
        <div class="card"><div style="font-size:11px;letter-spacing:0.5px;color:var(--forest);font-weight:700;margin-bottom:8px;">🛒 ${t('recentSales')}</div><div id="pd-sales"><div class="spinner"></div></div></div>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <button class="btn-forest" id="pd-edit" style="flex:1;padding:13px 0;">✏️ ${t('openForEdit')}</button>
          <button class="btn-secondary" id="pd-close" style="flex:1;padding:13px 0;">${t('closeBtn')}</button>
        </div>
      </div></div>`;
      $('cx').onclick=closeSheet;
      $('pd-edit')&&($('pd-edit').onclick=()=>{ closeSheet(); setTimeout(()=>prodForm(p),120); });
      $('pd-close')&&($('pd-close').onclick=closeSheet);
      // المخزون لكل فرع
      try{
        const qs=await getDocs(query(collection(db,'inventory'),where('productId','==',p.id)));
        const visIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
        const rows=[];
        qs.forEach(d=>{ const x=d.data(); if(!visIds.includes(x.branchId)) return; const b=branches.find(y=>y.id===x.branchId); rows.push({name:b?(lang==='ar'?b.nameAr:b.nameEn):x.branchId, qty:x.qty||0}); });
        if(!rows.length) $('pd-stock').innerHTML=`<div class="empty">${t('noStockAnywhere')}</div>`;
        else $('pd-stock').innerHTML=rows.map(r=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--ivory-dark);"><span>${r.name}</span><span class="num" style="font-weight:700;color:${(r.qty||0)===0?'var(--red)':'var(--charcoal)'};">${r.qty}</span></div>`).join('');
      }catch(e){ $('pd-stock').innerHTML=`<div class="empty">${t('errorGen')}</div>`; }
      // آخر مبيعات (آخر 5)
      try{
        let sales=[]; const visIds = profile.role==='admin' ? branches.map(b=>b.id) : (profile.branchIds||[]);
        if(profile.role==='admin'){ (await getDocs(collection(db,'sales'))).forEach(d=>sales.push(d.data())); }
        else { for(const b of visIds){ (await getDocs(query(collection(db,'sales'),where('branchId','==',b)))).forEach(d=>sales.push(d.data())); } }
        sales=sales.filter(s=>!s.voided && (s.items||[]).some(it=>it.productId===p.id));
        sales.sort((a,b)=>b.createdAt-a.createdAt); sales=sales.slice(0,5);
        if(!sales.length) $('pd-sales').innerHTML=`<div class="empty">${t('noSalesYet')}</div>`;
        else $('pd-sales').innerHTML=sales.map(s=>{ const it=(s.items||[]).find(x=>x.productId===p.id); const b=branches.find(y=>y.id===s.branchId);
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--ivory-dark);font-size:12.5px;">
            <div><div style="font-weight:600;">#${s.receiptNo||'—'} · ${b?(lang==='ar'?b.nameAr:b.nameEn):''}</div><div style="font-size:11px;color:rgba(26,26,26,0.5);">${fmtDT(s.createdAt,s.tzo)}</div></div>
            <div class="num" style="font-weight:700;color:var(--forest);">${it.qty} × ${fmt(it.price)} = ${fmt(it.qty*it.price)} ${t('currency')}</div></div>`; }).join('');
      }catch(e){ $('pd-sales').innerHTML=`<div class="empty">${t('errorGen')}</div>`; }
    }
    function scanForNewProduct(){
      openScanner(code=>{
        const c=String(code||'').trim();
        const ex=findByBarcode(c);
        if(ex){ toast(t('prodExistsScan')); prodForm(ex); return; }
        // مش لاقيه: حط الكود في البحث (تشوف القائمة فاضية) واسأل لو عايز تنشئه
        prodSearch=c;
        if(activeTab==='products') renderProducts();
        if(confirm(t('createNewWithBarcode'))) prodForm(null, c);
      });
    }
    // بيع بالباركود: امسح => يتضاف للكارت (زي السوبر ماركت)، وكل مسحة تزود الكمية
    function sellByScan(){
      openScanner(code=>{
        const p=findByBarcode(code);

    function onReceiveScan(code){

    // تصفير المخزون: كل الكميات صفر، المنتجات تفضل

      btn.disabled=true; btn.textContent=t('resetting');

    // تفريغ المخزن: حذف كل أصناف المخزن لهذا الفرع (المنتجات تفضل في الكتالوج)

      if(!confirm(t('confirmHardReset'))) return;

    function bindReceive(){
      const sel=$('rc-prod'), qEl=$('rc-qty'), cEl=$('rc-cost');
      const scanBtn=$('rc-scan'); if(scanBtn) scanBtn.onclick=()=>smartScan('receive');
      const supSel=$('rc-supplier'); if(supSel) supSel.onchange=()=>{ recvSupplier=supSel.value; };
      const refresh=()=>{
        const p=products.find(x=>x.id===sel.value);
        if(!p){ $('rc-cur').textContent=''; return; }
        const inv=inventory[p.id]||{qty:0,lastCost:0};
        $('rc-cur').innerHTML=`${t('currentQty')}: <span class="num" style="font-weight:700;">${inv.qty||0}</span> · ${t('cost')}: <span class="num">${fmt(inv.lastCost||0)}</span> ${t('currency')}`;
        if(!cEl.value && inv.lastCost) cEl.placeholder=String(inv.lastCost);
      };
      sel.onchange=refresh; qEl.oninput=()=>{}; 
      // ➕ أضف للقائمة
      $('rc-add').onclick=()=>{
        const p=products.find(x=>x.id===sel.value);
        const add=parseInt(qEl.value)||0;
        if(!p){ toast(t('selectProduct'),true); return; }
        if(add<=0){ toast(t('required'),true); return; }
        const inv=inventory[p.id]||{qty:0,lastCost:0};
        const cost = cEl.value!=='' ? parseFloat(cEl.value) : (inv.lastCost||0);
        const exist=recvCart.find(r=>r.productId===p.id);
        if(exist){ exist.qty+=add; exist.cost=cost; } else recvCart.push({productId:p.id,name:p.name,qty:add,cost});
        renderWarehouse();
      };
      // حذف صنف من القائمة
      document.querySelectorAll('.rc-del').forEach(b=>b.onclick=()=>{ recvCart.splice(parseInt(b.dataset.i),1); renderWarehouse(); });
      // 📥 استلام الكل
      const saveBtn=$('rc-save');
      if(saveBtn) saveBtn.onclick=async()=>{
        if(recvCart.length===0) return;
        saveBtn.disabled=true; saveBtn.textContent='...';
        const sup=suppliers.find(s=>s.id===recvSupplier);
        try{
          for(const r of recvCart){
            const inv=inventory[r.productId]||{qty:0,threshold:20,lastCost:0};
            const newQty=(inv.qty||0)+r.qty;
            await setDoc(doc(db,'inventory',`${currentBranchId}_${r.productId}`),{branchId:currentBranchId,productId:r.productId,qty:newQty,threshold:inv.threshold||20,lastCost:r.cost},{merge:true});
            inventory[r.productId]={qty:newQty,threshold:inv.threshold||20,lastCost:r.cost};
            await addDoc(collection(db,'loads'),{branchId:currentBranchId,productId:r.productId,name:r.name,qty:r.qty,unitCost:r.cost,total:r.qty*r.cost,supplierId:recvSupplier||null,supplierName:sup?sup.name:null,userId:user.uid,userName:profile.name||user.email,createdAt:Date.now()});
          }
          recvCart=[]; toast(t('receiveDone')); renderWarehouse();
        }catch(e){ console.error(e); toast(t('errorGen'),true); saveBtn.disabled=false; saveBtn.textContent='📥 '+t('loadAll'); }
      };
    }

    // ===== تحويل البضاعة بين المخازن (نقطة 4) — أدمن/مدير، فوري، مع سجل =====
    let transfersCache=null;
    function whTransferView(actives){
      const others=branches.filter(b=>b.id!==currentBranchId);
      if(branches.length<2) return `<div class="card"><div class="empty">${t('needTwoBranches')}</div></div>`;
      if(actives.length===0) return `<div class="card"><div class="empty">${t('noProdYet')}</div></div>`;

      return `<div class="card">
        <div class="card-title">🔄 ${t('transferGoods')}</div>

          <select class="input" id="tr-dest"><option value="">${t('selectDestBranch')}</option>
          ${others.map(b=>`<option value="${b.id}">${lang==='ar'?b.nameAr:b.nameEn}</option>`).join('')}</select></div>

        <button class="btn-gold btn-wide" id="tr-save">🔄 ${t('doTransfer')}</button>
      </div>
      <div class="card"><div class="card-title">📜 ${t('transferLog')}</div><div id="tr-log"><div class="spinner"></div></div></div>`;
    }
    function bindTransfer(actives){
      const sel=$('tr-prod'), dEl=$('tr-dest'), qEl=$('tr-qty');
      if(!sel) return;
      const refresh=()=>{
        const p=products.find(x=>x.id===sel.value);
        if(!p){ $('tr-cur').textContent=''; $('tr-after').textContent=''; return; }
        const inv=inventory[p.id]||{qty:0};
        $('tr-cur').innerHTML=`${t('currentQty')}: <span class="num" style="font-weight:700;">${inv.qty||0}</span>`;
        const n=parseInt(qEl.value)||0;
        $('tr-after').textContent = n>0 ? `${p.name}: ${(inv.qty||0)} → ${(inv.qty||0)-n}` : '';
      };
      sel.onchange=refresh; qEl.oninput=refresh;
      $('tr-scan')&&($('tr-scan').onclick=()=>smartScan('transfer'));
      $('tr-save').onclick=async()=>{
        const p=products.find(x=>x.id===sel.value);
        const dest=dEl.value;
        const n=parseInt(qEl.value)||0;
        if(!p){ toast(t('selectProduct'),true); return; }
        if(!dest){ toast(t('selectDestBranch'),true); return; }
        if(n<=0){ toast(t('required'),true); return; }
        const srcInv=inventory[p.id]||{qty:0,threshold:20,lastCost:0};
        if((srcInv.qty||0)<n){ toast(t('notEnoughStock'),true); return; }
        const b=$('tr-save'); b.disabled=true; b.textContent='...';
        try{
          // 1) ينقص من الفرع المصدر
          const srcQty=(srcInv.qty||0)-n;
          await setDoc(doc(db,'inventory',`${currentBranchId}_${p.id}`),{branchId:currentBranchId,productId:p.id,qty:srcQty,threshold:srcInv.threshold||20,lastCost:srcInv.lastCost||0},{merge:true});
          inventory[p.id]={qty:srcQty,threshold:srcInv.threshold||20,lastCost:srcInv.lastCost||0};
          // 2) يزيد في الفرع المستلم (نقرأ مخزونه الحالي مباشرة)
          let destData={qty:0,threshold:20,lastCost:srcInv.lastCost||0};
          try{ const ds=await getDoc(doc(db,'inventory',`${dest}_${p.id}`)); if(ds.exists()){ const x=ds.data(); destData={qty:x.qty||0,threshold:x.threshold||20,lastCost:x.lastCost||srcInv.lastCost||0}; } }catch(e){}
          const destQty=(destData.qty||0)+n;
          await setDoc(doc(db,'inventory',`${dest}_${p.id}`),{branchId:dest,productId:p.id,qty:destQty,threshold:destData.threshold||20,lastCost:destData.lastCost||0},{merge:true});
          // 3) يسجّل التحويل
          const ts=Date.now();
          await addDoc(collection(db,'transfers'),{fromBranchId:currentBranchId,toBranchId:dest,productId:p.id,name:p.name,qty:n,byUserId:user.uid,byName:profile.name||user.email,createdAt:ts,tzo:tzOffsetMin(ts)});
          transfersCache=null;
          toast(t('transferDone')); renderWarehouse();
        }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='🔄 '+t('doTransfer'); }
      };
      loadTransferLog();
    }
    async function loadTransferLog(){
      const box=$('tr-log'); if(!box) return;
      try{
        let list=[];
        // التحويلات اللي الفرع الحالي طرف فيها (مصدر أو مستلم)
        const q1=await getDocs(query(collection(db,'transfers'),where('fromBranchId','==',currentBranchId)));
        q1.forEach(d=>list.push(d.data()));
        const q2=await getDocs(query(collection(db,'transfers'),where('toBranchId','==',currentBranchId)));
        q2.forEach(d=>list.push(d.data()));
        list.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); list=list.slice(0,30);
        const bn=id=>{ const b=branches.find(x=>x.id===id); return b?(lang==='ar'?b.nameAr:b.nameEn):id; };
        if(list.length===0){ box.innerHTML=`<div class="empty">${t('noTransfers')}</div>`; return; }
        box.innerHTML=list.map(x=>{
          const out=x.fromBranchId===currentBranchId;
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--ivory-dark);">
            <div style="min-width:0;">
              <div style="font-weight:700;font-size:13px;">${out?'📤':'📥'} <span class="fr" dir="ltr">${x.name}</span> <span class="num">×${x.qty}</span></div>
              <div class="num" style="font-size:11px;color:rgba(26,26,26,0.55);">${bn(x.fromBranchId)} → ${bn(x.toBranchId)} · ${fmtDT(x.createdAt,x.tzo)} · ${x.byName||''}</div>
            </div>
            <span style="font-size:11px;font-weight:700;color:${out?'var(--red)':'var(--green)'};">${out?'−':'+'}${x.qty}</span>
          </div>`;
        }).join('');
      }catch(e){ console.error(e); box.innerHTML=`<div class="empty">${t('errorGen')}</div>`; }
    }

    function whCountView(actives){
      if(actives.length===0) return `<div class="card"><div class="empty">${t('noProdYet')}</div></div>`;
      const rows=actives.map(p=>{
        const inv=inventory[p.id]||{qty:0,lastCost:0};
        const cv=invCounts[p.id]!==undefined?invCounts[p.id]:'';
        return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--ivory-dark);">

          <input class="input num" id="cnt-${p.id}" data-pid="${p.id}" type="number" min="0" dir="ltr" value="${cv}" placeholder="${t('enterCount')}" style="width:90px;padding:8px;">

        </div>`;
      }).join('');
      return `<div class="card">
        <div class="card-title">📋 ${t('physInv')}</div>
        <div style="font-size:12px;color:rgba(26,26,26,0.55);margin-bottom:6px;">${t('adjustNote')}</div>
        <div style="font-size:11px;color:rgba(26,26,26,0.45);margin-bottom:10px;">${t('leaveBlank')}</div>
        <button class="btn-secondary btn-wide" id="cnt-scan" style="margin-bottom:10px;">📷 ${t('scanBtn')}</button>
        ${rows}
        <div id="cnt-sum" style="margin-top:12px;font-size:12px;color:rgba(26,26,26,0.6);"></div>
        <button class="btn-gold btn-wide" id="cnt-apply" style="margin-top:12px;">⚖️ ${t('applyInv')}</button>
      </div>`;
    }

    function bindCount(actives){
      const upd=(pid)=>{
        const el=$('cnt-'+pid); const inv=inventory[pid]||{qty:0};
        const dEl=$('d-'+pid);
        if(el.value===''){ invCounts[pid]=undefined; delete invCounts[pid]; dEl.textContent='—'; dEl.style.color='rgba(26,26,26,0.4)'; recompSum(); return; }
        invCounts[pid]=el.value;
        const diff=(parseInt(el.value)||0)-(inv.qty||0);
        dEl.textContent=(diff>0?'+':diff<0?'−':'')+fmt(diff);
        dEl.style.color=diff>0?'var(--amber)':diff<0?'var(--red)':'var(--green)';
        recompSum();
      };
      const recompSum=()=>{
        let counted=0,surplus=0,shortage=0,valImpact=0;
        actives.forEach(p=>{ if(invCounts[p.id]===undefined)return; counted++;
          const inv=inventory[p.id]||{qty:0,lastCost:0}; const diff=(parseInt(invCounts[p.id])||0)-(inv.qty||0);
          if(diff>0)surplus++; else if(diff<0)shortage++; valImpact+=diff*(inv.lastCost||0); });
        $('cnt-sum').innerHTML=`${t('totalItems')}: <b>${counted}</b> · ${t('surplus')}: <b style="color:var(--amber);">${surplus}</b> · ${t('shortage')}: <b style="color:var(--red);">${shortage}</b><br>${t('valueImpact')}: <b class="num" style="color:${valImpact<0?'var(--red)':'var(--green)'};">${valImpact>0?'+':valImpact<0?'−':''}${fmt(valImpact)} ${t('currency')}</b>`;
      };
      actives.forEach(p=>{ const el=$('cnt-'+p.id); el.oninput=()=>upd(p.id); if(invCounts[p.id]!==undefined) upd(p.id); });
      $('cnt-scan')&&($('cnt-scan').onclick=()=>smartScan('count'));
      recompSum();
      $('cnt-apply').onclick=async()=>{
        const lines=[];

          const inv=inventory[p.id]||{qty:0,lastCost:0}; const counted=parseInt(invCounts[p.id])||0;
          lines.push({pid:p.id,name:p.name,system:inv.qty||0,counted,diff:counted-(inv.qty||0),cost:inv.lastCost||0,threshold:inv.threshold||20}); });
        if(lines.length===0){ toast(t('noChanges'),true); return; }
        if(!confirm(t('confirmApplyInv'))) return;
        const b=$('cnt-apply'); b.disabled=true; b.textContent='...';

          for(const ln of lines){
            await setDoc(doc(db,'inventory',`${currentBranchId}_${ln.pid}`),{branchId:currentBranchId,productId:ln.pid,qty:ln.counted,threshold:ln.threshold,lastCost:ln.cost},{merge:true});
            inventory[ln.pid]={qty:ln.counted,threshold:ln.threshold,lastCost:ln.cost};
          }
          await addDoc(collection(db,'inventories'),{branchId:currentBranchId,userId:user.uid,userName:profile.name||user.email,createdAt:Date.now(),
            lines:lines.map(l=>({productId:l.pid,name:l.name,system:l.system,counted:l.counted,diff:l.diff,cost:l.cost}))});
          invCounts={};
          toast(t('invApplied'));
          showInvReport(lines);
        }catch(e){ console.error(e); toast(t('errorGen'),true); b.disabled=false; b.textContent='⚖️ '+t('applyInv'); }
      };
    }

          <div style="flex:1;background:rgba(216,142,42,0.1);border-radius:10px;padding:9px;text-align:center;min-width:70px;"><div style="font-size:10px;color:rgba(26,26,26,0.55);font-weight:700;">${t('surplus')}</div><div class="num" style="font-size:17px;font-weight:700;color:var(--amber);">${surplus}</div></div>
          <div style="flex:1;background:rgba(192,72,72,0.08);border-radius:10px;padding:9px;text-align:center;min-width:70px;"><div style="font-size:10px;color:rgba(26,26,26,0.55);font-weight:700;">${t('shortage')}</div><div class="num" style="font-size:17px;font-weight:700;color:var(--red);">${shortage}</div></div>
